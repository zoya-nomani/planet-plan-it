<!DOCTYPE html>
<!-- saved from url=(0051)file:///C:/Users/zoyan/Downloads/my-calendar_7.html -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">

<style>
:root{
  --bg:#F7F6F2;--surface:#FFF;--surface2:#F0EEE8;
  --border:rgba(0,0,0,.09);--border-med:rgba(0,0,0,.16);
  --text:#1A1916;--text2:#6B6860;--text3:#A8A69F;
  --radius:10px;--radius-lg:16px;
  --font:'Times New Roman',Times,serif;--font-display:'Times New Roman',Times,serif;
  --shadow:0 2px 12px rgba(0,0,0,.07);--shadow-lg:0 8px 40px rgba(0,0,0,.15);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#131210;--surface:#1C1B18;--surface2:#252420;
  --border:rgba(255,255,255,.07);--border-med:rgba(255,255,255,.13);
  --text:#F0EEE8;--text2:#9A9890;--text3:#5A5956;
  --shadow:0 2px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.6);
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.layout{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 14px;overflow-y:auto}
.logo{font-family:var(--font-display);font-size:21px;color:var(--text);margin-bottom:26px;padding-left:4px}
.logo span{color:var(--text3);font-family:var(--font);font-size:11px;font-weight:400;display:block;margin-top:2px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:0 0 5px 8px}
.nav-section{margin-bottom:24px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:13px;color:var(--text2);text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface2);color:var(--text);font-weight:500}
.nav-icon{width:18px;text-align:center;font-size:13px}
.cals-section{flex:1}
.cal-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;transition:background .1s;user-select:none}
.cal-item:hover{background:var(--surface2)}
.cal-dot{width:22px;height:22px;position:relative;flex-shrink:0;transition:opacity .15s;display:flex;align-items:center;justify-content:center;overflow:visible}
.planet-icon{position:relative;display:block;width:20px;height:20px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.15))}
.planet-core{position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle at 32% 30%,rgba(255,255,255,.75),rgba(255,255,255,0) 28%),var(--planet,#3B82F6);box-shadow:inset -3px -3px 0 rgba(0,0,0,.14)}
.planet-ring{position:absolute;left:-2px;right:-2px;top:8px;height:7px;border:1.6px solid var(--planet-ring,rgba(59,130,246,.5));border-radius:50%;transform:rotate(var(--ring-tilt,-18deg));opacity:.95;background:linear-gradient(90deg,transparent 0 14%,rgba(255,255,255,.28) 14% 22%,transparent 22% 78%,rgba(255,255,255,.18) 78% 86%,transparent 86% 100%)}
.planet-spot{position:absolute;border-radius:50%;background:rgba(255,255,255,.26)}
.planet-spot.s1{width:4px;height:4px;left:6px;top:6px}
.planet-spot.s2{width:3px;height:3px;right:5px;top:9px}
.planet-spot.s3{width:2px;height:2px;left:9px;bottom:5px}
.planet-v1{--ring-tilt:-24deg}
.planet-v2{--ring-tilt:18deg}
.planet-v3 .planet-ring{left:1px;right:1px;top:4px;height:12px;transform:rotate(0deg);opacity:.5}
.planet-v4 .planet-ring{left:-3px;right:-3px;border-style:dashed}
.cal-item.hidden .cal-dot{opacity:.25}
.cal-name{font-size:13px;color:var(--text2);flex:1}
.cal-item.hidden .cal-name{color:var(--text3)}
.cal-edit-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:2px 5px;border-radius:4px;opacity:0;transition:opacity .15s}
.cal-item:hover .cal-edit-btn{opacity:1}
.cal-edit-btn:hover{color:var(--text);background:var(--surface2)}
.new-cal-btn{display:flex;align-items:center;gap:7px;width:100%;background:none;border:1px dashed var(--border-med);padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text3);margin-top:6px;transition:all .15s}
.new-cal-btn:hover{border-color:var(--text3);color:var(--text2);background:var(--surface2)}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.footer-btn{display:flex;align-items:center;gap:7px;width:100%;background:none;border:1px solid var(--border-med);padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text2);transition:all .15s}
.footer-btn:hover{background:var(--surface2);color:var(--text)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:10px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.view-tabs{display:flex;background:var(--surface2);border-radius:var(--radius);padding:3px;gap:2px}
.view-tab{background:none;border:none;padding:5px 13px;border-radius:7px;cursor:pointer;font-family:var(--font);font-size:13px;color:var(--text2);transition:all .15s}
.view-tab:hover{background:var(--surface);color:var(--text)}
.view-tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:var(--shadow)}
.period-nav{display:flex;align-items:center;gap:6px}
.pnav-btn{background:none;border:1px solid var(--border-med);border-radius:8px;width:28px;height:28px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.pnav-btn:hover{background:var(--surface2);color:var(--text)}
.period-label{font-size:14px;font-weight:500;color:var(--text);min-width:170px;text-align:center}
.add-btn{background:var(--text);color:var(--bg);border:none;padding:8px 17px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.83}
.content{flex:1;overflow-y:auto;padding:24px 26px}

/* TODAY */
.today-hdr{margin-bottom:20px}
.today-big{font-family:var(--font-display);font-size:40px;color:var(--text);line-height:1;letter-spacing:-1px}
.today-sub{font-size:13px;color:var(--text3);margin-top:4px}
.no-events{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--text3);text-align:center;gap:8px}

/* PROPORTIONAL TIMELINE */
.tl-wrap{position:relative}
.tl-allday-strip{display:flex;flex-wrap:wrap;gap:4px;padding:0 0 10px 56px;margin-bottom:4px}
.tl-allday-chip{border-radius:4px;padding:4px 10px;font-size:12px;font-weight:500;color:#fff;cursor:pointer;transition:opacity .1s}
.tl-allday-chip:hover{opacity:.82}
.tl-grid{display:flex;gap:0}
.tl-labels{width:56px;flex-shrink:0;position:relative}
.tl-label{position:absolute;right:10px;font-size:10px;color:var(--text3);font-weight:500;line-height:1;transform:translateY(-50%)}
.tl-cols{flex:1;position:relative}
.tl-hline{position:absolute;left:0;right:0;border-top:1px solid var(--border)}
.tl-ev{position:absolute;border-radius:var(--radius);border:1px solid var(--border);border-left-width:4px;cursor:pointer;transition:all .15s;overflow:hidden;padding:3px 7px;min-height:20px}
.tl-ev:hover{box-shadow:var(--shadow);z-index:5}
.tl-ev-time{font-size:10px;color:rgba(255,255,255,.8);font-weight:500;white-space:nowrap;line-height:1.2}
.tl-ev-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tl-ev-cal{font-size:10px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-ev-desc{font-size:10px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* WEEK */
.week-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.week-hdr-grid{display:grid;grid-template-columns:56px repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)}
.week-corner{border-right:1px solid var(--border)}
.wdh{padding:9px 6px;text-align:center;border-right:1px solid var(--border)}
.wdh:last-child{border-right:none}
.wdh-name{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.wdh-num{font-size:17px;color:var(--text2);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:3px auto 0;cursor:pointer;transition:background .15s}
.wdh-num:hover{background:var(--surface2)}
.wdh-num.wtoday{background:var(--text);color:var(--bg);font-weight:600}
.week-allday-grid{display:grid;grid-template-columns:56px repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border);min-height:24px}
.week-allday-lbl{display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-right:1px solid var(--border)}
.week-allday-cell{padding:2px 3px;border-right:1px solid var(--border)}
.week-allday-cell:last-child{border-right:none}
.week-allday-chip{display:block;border-radius:3px;padding:2px 5px;font-size:10px;font-weight:500;color:#fff;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .1s}
.week-allday-chip:hover{opacity:.82}
.week-scroll{overflow-y:auto;max-height:calc(100vh - 310px)}
.week-body-grid{display:grid;grid-template-columns:56px repeat(7,minmax(0,1fr))}
.week-time-col{display:flex;flex-direction:column}
.week-hour-lbl{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:0;margin-top:-6px;font-size:10px;color:var(--text3);font-weight:500;line-height:1}
.week-day-col{position:relative;border-right:1px solid var(--border)}
.week-day-col:last-child{border-right:none}
.week-day-col.wctoday{background:var(--surface2)}
.week-hour-bg{height:60px;border-bottom:1px solid var(--border)}
.week-ev{position:absolute;border-radius:5px;padding:2px 5px;font-size:11px;font-weight:500;color:#fff;cursor:pointer;overflow:hidden;transition:opacity .1s;z-index:1;line-height:1.3}
.week-ev:hover{opacity:.85;z-index:3}
.week-ev-time{font-size:9px;opacity:.85}

/* MONTH */
.month-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.mhdr{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)}
.mhdr-cell{padding:9px 0;text-align:center;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.mgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.mcell{min-height:90px;padding:7px 5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.mcell:hover{background:var(--surface2)}
.mcell:nth-child(7n){border-right:none}
.mcell.mother{background:var(--bg)}
.mcell.mother .mday{color:var(--text3)}
.mcell.mtoday{background:var(--surface2)}
.mday{font-size:12px;color:var(--text2);font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.mcell.mtoday .mday{background:var(--text);color:var(--bg);font-weight:600}
.mchip{display:block;border-radius:3px;padding:2px 5px;font-size:10px;font-weight:500;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .1s}
.mchip:hover{opacity:.82}
.mmore{font-size:10px;color:var(--text3);padding:1px 4px;font-weight:500;cursor:pointer}
.mmore:hover{color:var(--text2)}

/* NOTES */
.split-layout{display:flex;gap:16px;height:calc(100vh - 130px)}
.split-sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.split-sidebar h2{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:2px;padding-left:2px}
.note-item{padding:10px 12px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.note-item:hover{border-color:var(--border-med)}
.note-item.active{border-color:var(--text3);background:var(--surface2)}
.note-item-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-preview{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-date{font-size:10px;color:var(--text3);margin-top:3px}
.new-side-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:1px dashed var(--border-med);border-radius:var(--radius);padding:9px;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text3);transition:all .15s}
.new-side-btn:hover{border-color:var(--text3);color:var(--text2);background:var(--surface2)}
.split-main{flex:1;display:flex;flex-direction:column;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;min-width:0}
.split-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:8px;font-size:14px}
.note-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.note-title-inp{flex:1;background:none;border:none;outline:none;font-family:var(--font-display);font-size:21px;color:var(--text)}
.note-title-inp::placeholder{color:var(--text3)}
.note-del-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:5px 9px;border-radius:var(--radius);transition:all .15s}
.note-del-btn:hover{color:#C0392B;background:rgba(192,57,43,.08)}
.note-body-inp{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--text2);padding:16px;resize:none;line-height:1.75}
.note-body-inp::placeholder{color:var(--text3)}
.note-saved{font-size:10px;color:var(--text3);text-align:right;padding:0 14px 8px}

/* TODO */
.tlist-item{padding:8px 11px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
.tlist-item:hover{border-color:var(--border-med)}
.tlist-item.active{border-color:var(--text3);background:var(--surface2)}
.tlist-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tlist-name{font-size:13px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tlist-count{font-size:11px;color:var(--text3)}
.todo-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.todo-list-title{font-size:18px;font-weight:500;color:var(--text);font-family:var(--font-display)}
.todo-list-edit{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:4px 8px;border-radius:var(--radius);transition:all .15s}
.todo-list-edit:hover{color:var(--text);background:var(--surface2)}
.todo-items{flex:1;overflow-y:auto;padding:6px 0}
.todo-item{display:flex;align-items:flex-start;gap:11px;padding:9px 18px;transition:background .1s}
.todo-item:hover{background:var(--surface2)}
.todo-main{flex:1;min-width:0}
.todo-cb{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border-med);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.todo-cb.checked{background:var(--text);border-color:var(--text)}
.todo-cb.checked::after{content:'âœ“';font-size:10px;color:var(--bg)}
.todo-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.todo-text.done{text-decoration:line-through;color:var(--text3)}
.todo-meta{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.todo-del{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:2px 6px;border-radius:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.todo-item:hover .todo-del{opacity:1}
.todo-del:hover{color:#C0392B}
.todo-detail-btn{background:none;border:1px dashed var(--border-med);border-radius:var(--radius);padding:6px 10px;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text3);transition:all .15s}
.todo-detail-btn:hover{border-color:var(--text3);color:var(--text)}
.todo-add-row{display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0}
.todo-add-inp{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:13px;color:var(--text)}
.todo-add-inp::placeholder{color:var(--text3)}
.todo-add-btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:6px 13px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;transition:opacity .15s}
.todo-add-btn:hover{opacity:.82}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fdin .15s ease}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border-med);padding:24px;width:500px;max-width:96vw;box-shadow:var(--shadow-lg);animation:scalein .15s ease;max-height:90vh;overflow-y:auto}
@keyframes scalein{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.frow textarea{resize:vertical;min-height:80px;line-height:1.6}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--text3)}
.frow input.err{border-color:#E24B4A}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.mbtn{padding:8px 17px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;border:1px solid var(--border-med);background:none;color:var(--text2);transition:all .15s}
.mbtn:hover{background:var(--surface2);color:var(--text)}
.mbtn-primary{background:var(--text);color:var(--bg);border-color:transparent}
.mbtn-primary:hover{opacity:.83;background:var(--text)}
.mbtn-danger{color:#C0392B;border-color:rgba(192,57,43,.25)}
.mbtn-danger:hover{background:rgba(192,57,43,.08)}
.tip{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}

/* COLOR PICKER */
.color-picker-wrap{display:flex;flex-direction:column;gap:8px}
.color-swatches{display:flex;flex-wrap:wrap;gap:6px}
.cswatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;outline:2px solid transparent;outline-offset:2px;flex-shrink:0}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{outline-color:var(--text)}
.color-custom-row{display:flex;align-items:center;gap:8px}
.color-wheel-inp{width:34px;height:34px;padding:0;border:none;border-radius:50%;cursor:pointer;background:none;outline:none;flex-shrink:0}
.color-wheel-inp::-webkit-color-swatch-wrapper{padding:0;border-radius:50%}
.color-wheel-inp::-webkit-color-swatch{border:none;border-radius:50%}
.color-hex-inp{flex:1;font-size:13px;padding:6px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none}
.color-preview{width:26px;height:26px;border-radius:50%;flex-shrink:0;border:2px solid var(--border-med)}

/* EVENT DETAIL */
.ev-hdr{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px}
.ev-color-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-title-txt{font-size:19px;font-weight:600;color:var(--text);line-height:1.2}
.ev-meta{font-size:13px;color:var(--text2);margin-bottom:4px}
.ev-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;margin:6px 0 10px}
.ev-section{margin-top:14px}
.ev-section-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.ev-section-body{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.ev-section-body a{color:var(--text)}
.ev-info-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:13px}
.ev-info-key{color:var(--text3);white-space:nowrap;padding-top:1px}
.ev-info-val{color:var(--text2);word-break:break-all}
.ev-info-val a{color:var(--text)}
.ev-notes-ta{width:100%;font-size:13px;padding:9px 11px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;resize:vertical;min-height:75px;line-height:1.6;transition:border-color .15s}
.ev-notes-ta:focus{border-color:var(--text3)}
.inline-actions{display:flex;gap:8px;flex-wrap:wrap}
.agenda-list{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.agenda-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;background:var(--surface)}
.agenda-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.agenda-title{font-size:16px;font-weight:600;color:var(--text)}
.agenda-time{font-size:12px;color:var(--text3);margin-bottom:4px}
.agenda-meta{font-size:12px;color:var(--text2);line-height:1.6;margin-top:6px}
.travel-card{border:1px dashed var(--border-med);border-radius:var(--radius);padding:10px 12px;margin-left:16px;background:var(--surface2);font-size:12px;color:var(--text2);line-height:1.6}
.travel-card a{color:var(--text)}
.frow-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* DAY BREAKDOWN */
.day-breakdown{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.breakdown-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.breakdown-bar{display:flex;height:8px;border-radius:99px;overflow:hidden;margin-bottom:14px;gap:1px}
.breakdown-segment{height:100%;transition:flex .3s}
.breakdown-items{display:flex;flex-direction:column;gap:8px}
.breakdown-item{display:flex;align-items:center;gap:10px}
.breakdown-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.breakdown-label{flex:1;font-size:13px;color:var(--text2);line-height:1.3}
.breakdown-pct{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap}
.breakdown-free{font-style:italic;color:var(--text3)}

}

<script>
// â”€â”€ CONSTANTS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const PALETTE=['#3B82F6','#8B5CF6','#10B981','#EF4444','#F59E0B','#06B6D4','#EC4899','#F97316','#64748B','#84CC16','#6366F1','#14B8A6','#E11D48','#D97706','#0EA5E9'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT=['Su','Mo','Tu','We','Th','Fr','Sa'];
const TODAY=new Date();
const PX_PER_HOUR=60;
const DAY_MINS=24*60; // use full 24h day for breakdown %

// â”€â”€ STATE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let S=loadState();
let view='today';
let navYear=TODAY.getFullYear(), navMonth=TODAY.getMonth();
let navWeekStart=weekStart(TODAY);
let activeNoteId=null, activeTodoListId=null, noteSaveTimer=null;

function defaultState(){return{
  calendars:[{id:1,name:'Work',color:'#3B82F6',visible:true},{id:2,name:'Personal',color:'#8B5CF6',visible:true},{id:3,name:'Other',color:'#10B981',visible:true}],
  events:[],notes:[],todoLists:[{id:1,name:'Tasks',color:'#3B82F6'}],todos:[],
  nextCalId:4,nextEvId:1,nextNoteId:1,nextTodoListId:2,nextTodoId:1
};}
function loadState(){try{const s=localStorage.getItem('mycal_v6');return s?JSON.parse(s):defaultState();}catch{return defaultState();}}
function persist(){localStorage.setItem('mycal_v6',JSON.stringify(S));}

// â”€â”€ HELPERS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function fmtDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function todayStr(){return fmtDate(TODAY);}
function getCal(id){return S.calendars.find(c=>c.id===id);}
function fmt12(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${pad(m)} ${h>=12?'PM':'AM'}`;}
function timeToMins(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+(m||0);}
function hex2rgba(hex,a){hex=(hex||'#888').replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);return`rgba(${r},${g},${b},${a})`;}
function visCals(){return new Set(S.calendars.filter(c=>c.visible).map(c=>c.id));}
function weekStart(d){const d2=new Date(d);d2.setHours(0,0,0,0);d2.setDate(d2.getDate()-d2.getDay());return d2;}
function addDays(d,n){const d2=new Date(d);d2.setDate(d2.getDate()+n);return d2;}
function fmtShort(d){return MONTHS[d.getMonth()].slice(0,3)+' '+d.getDate();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function linkify(t){return esc(t).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}
function validHex(h){return/^#[0-9A-Fa-f]{6}$/.test(h);}

// â”€â”€ SIDEBAR â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderSidebar(){
  const el=document.getElementById('sideCalsList');el.innerHTML='';
  S.calendars.forEach(cal=>{
    const row=document.createElement('div');row.className='cal-item'+(cal.visible?'':' hidden');

    el.appendChild(row);
  });
  const ab=document.getElementById('topAddBtn');
  ab.textContent=view==='notes'?'+ New note':view==='todo'?'+ New list':'+ Add event';
}

// â”€â”€ TIMELINE builder (shared by Today + Day Preview) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function buildTimeline(evs){
  const wrap=document.createElement('div');wrap.className='tl-wrap';
  const allDay=evs.filter(e=>!e.time);
  const timed=evs.filter(e=>!!e.time);

  // all-day strip
  if(allDay.length){
    const strip=document.createElement('div');strip.className='tl-allday-strip';
    allDay.forEach(ev=>{
      const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
      const chip=document.createElement('div');chip.className='tl-allday-chip';chip.style.background=color;chip.textContent=ev.title;
      chip.onclick=()=>openEventDetail(ev.id);strip.appendChild(chip);
    });
    wrap.appendChild(strip);
  }

  if(!timed.length){
    if(!allDay.length){const e=document.createElement('div');e.className='no-events';e.innerHTML='<div style="font-size:28px">ðŸ—“</div><div>Nothing scheduled</div>';wrap.appendChild(e);}
    return wrap;
  }

  // hour range
  const allMins=timed.map(e=>timeToMins(e.time)).filter(m=>m!==null);
  const endMins=timed.map(e=>{const s=timeToMins(e.time);return s+(e.durationMins||60);});
  const startHour=Math.max(0,Math.floor(Math.min(...allMins)/60));
  const endHour=Math.min(24,Math.ceil(Math.max(...endMins)/60)+1);
  const totalHours=Math.max(endHour-startHour,1);
  const totalPx=totalHours*PX_PER_HOUR;

  const grid=document.createElement('div');grid.className='tl-grid';

  // label column
  const lblCol=document.createElement('div');lblCol.className='tl-labels';lblCol.style.height=totalPx+'px';
  for(let h=startHour;h<=endHour;h++){
    if(h>23)continue;
    const lbl=document.createElement('div');lbl.className='tl-label';
    lbl.style.top=`${(h-startHour)*PX_PER_HOUR}px`;lbl.textContent=fmt12(pad(h)+':00');
    lblCol.appendChild(lbl);
  }
  grid.appendChild(lblCol);

  // events column
  const evCol=document.createElement('div');evCol.className='tl-cols';evCol.style.height=totalPx+'px';
  for(let h=startHour;h<=endHour;h++){const line=document.createElement('div');line.className='tl-hline';line.style.top=`${(h-startHour)*PX_PER_HOUR}px`;evCol.appendChild(line);}

  // layout overlap columns
  const placed=[];
  timed.sort((a,b)=>a.time.localeCompare(b.time)).forEach(ev=>{
    const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
    const sm=timeToMins(ev.time);const dur=ev.durationMins||60;const em=sm+dur;
    const top=((sm/60)-startHour)*PX_PER_HOUR;
    const height=Math.max((dur/60)*PX_PER_HOUR-2,22);
    // find free column
    let col=0;while(placed.some(p=>p.col===col&&p.em>sm&&p.sm<em))col++;
    placed.push({sm,em,col,ev});
    // compute max cols in this overlap group
    const group=placed.filter(p=>p.em>sm&&p.sm<em);
    const maxCol=group.reduce((mx,p)=>Math.max(mx,p.col+1),1);
    const colW=100/maxCol;
    const el=document.createElement('div');el.className='tl-ev';
    el.style.cssText=`top:${top}px;height:${height}px;left:${col*colW}%;width:calc(${colW}% - 3px);background:${color};border-left-color:${color};color:#fff;`;
    const preview=(ev.description||ev.notes||'').replace(/\n/g,' ');
    el.innerHTML=`<div class="tl-ev-time">${fmt12(ev.time)}${ev.endTime?' â€“ '+fmt12(ev.endTime):''}</div><div class="tl-ev-title">${esc(ev.title)}</div><div class="tl-ev-cal">${esc(cal?cal.name:'')}</div>${preview?`<div class="tl-ev-desc">${esc(preview.substring(0,80))}</div>`:''}`;
    el.onclick=()=>openEventDetail(ev.id);
    evCol.appendChild(el);
  });
  // second pass: fix widths based on full group size
  placed.forEach(p=>{
    const group=placed.filter(q=>q.em>p.sm&&q.sm<p.em);
    const maxCol=group.reduce((mx,q)=>Math.max(mx,q.col+1),1);
    const colW=100/maxCol;
    // find the DOM element (nth tl-ev)
    const idx=placed.indexOf(p);
    const els=evCol.querySelectorAll('.tl-ev');
    if(els[idx]){els[idx].style.left=`${p.col*colW}%`;els[idx].style.width=`calc(${colW}% - 3px)`;}
  });

  grid.appendChild(evCol);
  wrap.appendChild(grid);
  return wrap;
}

// â”€â”€ DAY BREAKDOWN â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function buildBreakdown(evs){
  const timed=evs.filter(e=>e.time&&e.durationMins>0);
  if(!timed.length)return null;

  // merge overlapping intervals for free-time calc
  const intervals=timed.map(e=>[timeToMins(e.time),timeToMins(e.time)+(e.durationMins||60)]).sort((a,b)=>a[0]-b[0]);
  const merged=[];
  intervals.forEach(([s,e])=>{if(!merged.length||merged[merged.length-1][1]<s)merged.push([s,e]);else merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],e);});
  const busyMins=merged.reduce((t,[s,e])=>t+(e-s),0);
  const freeMins=Math.max(0,DAY_MINS-busyMins);
  const freePct=Math.round(freeMins/DAY_MINS*100);

  // per-event (show every event individually)
  const eventItems=timed.map(ev=>{
    const dur=ev.durationMins||60;
    const pct=Math.round(dur/DAY_MINS*100);
    const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
    return{title:ev.title,pct,color,dur};
  }).sort((a,b)=>b.dur-a.dur);

  const wrap=document.createElement('div');wrap.className='day-breakdown';
  const title=document.createElement('div');title.className='breakdown-title';title.textContent='Your day at a glance';
  wrap.appendChild(title);

  // stacked bar
  const bar=document.createElement('div');bar.className='breakdown-bar';
  eventItems.forEach(item=>{
    const seg=document.createElement('div');seg.className='breakdown-segment';
    seg.style.cssText=`flex:${item.pct};background:${item.color};min-width:${item.pct>0?2:0}px`;
    bar.appendChild(seg);
  });
  if(freePct>0){const seg=document.createElement('div');seg.className='breakdown-segment';seg.style.cssText=`flex:${freePct};background:var(--border-med)`;bar.appendChild(seg);}
  wrap.appendChild(bar);

  const list=document.createElement('div');list.className='breakdown-items';
  eventItems.forEach(item=>{
    if(item.pct===0)return;
    const row=document.createElement('div');row.className='breakdown-item';
    const h=Math.floor(item.dur/60),m=item.dur%60;
    const durStr=h>0?(m>0?`${h}h ${m}m`:`${h}h`):`${m}m`;
    row.innerHTML=`<div class="breakdown-dot" style="background:${item.color}"></div><div class="breakdown-label">${esc(item.title)} <span style="font-size:11px;color:var(--text3)">(${durStr})</span></div><div class="breakdown-pct">${item.pct}%</div>`;
    list.appendChild(row);
  });
  // free time row
  if(freePct>0){
    const row=document.createElement('div');row.className='breakdown-item';
    const fh=Math.floor(freeMins/60),fm=freeMins%60;
    const fdurStr=fh>0?(fm>0?`${fh}h ${fm}m`:`${fh}h`):`${fm}m`;
    row.innerHTML=`<div class="breakdown-dot" style="background:var(--border-med)"></div><div class="breakdown-label breakdown-free">you were on your own planet <span style="font-size:11px">(${fdurStr})</span></div><div class="breakdown-pct">${freePct}%</div>`;
    list.appendChild(row);
  }
  wrap.appendChild(list);
  return wrap;
}

// â”€â”€ TODAY â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderToday(){
  const el=document.getElementById('mainContent');
  const ts=todayStr(),vis=visCals();
  const evs=S.events.filter(e=>e.date===ts&&vis.has(e.calId)).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  el.innerHTML='';
  const hdr=document.createElement('div');hdr.className='today-hdr';
  hdr.innerHTML=`<div class="today-big">${MONTHS[TODAY.getMonth()]} ${TODAY.getDate()}</div><div class="today-sub">${DAYS[TODAY.getDay()]} Â· ${TODAY.getFullYear()}</div>`;
  el.appendChild(hdr);
  el.appendChild(buildTimeline(evs));
  const bd=buildBreakdown(evs);if(bd)el.appendChild(bd);
}

// â”€â”€ WEEK â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderWeek(){
  const el=document.getElementById('mainContent');
  const vis=visCals(),ts=todayStr();
  const days=Array.from({length:7},(_,i)=>addDays(navWeekStart,i));
  const allTimedEvs=days.flatMap(d=>S.events.filter(e=>e.date===fmtDate(d)&&vis.has(e.calId)&&e.time));
  const allMins=allTimedEvs.map(e=>timeToMins(e.time)).filter(m=>m!==null);
  const allEnds=allTimedEvs.map(e=>timeToMins(e.time)+(e.durationMins||60));
  const startHour=allMins.length?Math.max(0,Math.floor(Math.min(...allMins)/60)):7;
  const endHour=allEnds.length?Math.min(24,Math.ceil(Math.max(...allEnds)/60)+1):20;
  const totalPx=(endHour-startHour)*PX_PER_HOUR;

  // build header
  const hdrGrid=document.createElement('div');hdrGrid.className='week-hdr-grid';
  hdrGrid.innerHTML='<div class="week-corner"></div>'+days.map(d=>{const ds=fmtDate(d);const isT=ds===ts;return`<div class="wdh"><div class="wdh-name">${SHORT[d.getDay()]}</div><div class="wdh-num${isT?' wtoday':''}" onclick="openDayPreview('${ds}')">${d.getDate()}</div></div>`;}).join('');

  // all-day row
  const allDayGrid=document.createElement('div');allDayGrid.className='week-allday-grid';
  allDayGrid.innerHTML='<div class="week-allday-lbl">all day</div>'+days.map(d=>{
    const ds=fmtDate(d);
    const adEvs=S.events.filter(e=>e.date===ds&&vis.has(e.calId)&&!e.time);
    return`<div class="week-allday-cell">${adEvs.map(ev=>{const cal=getCal(ev.calId);const c=cal?cal.color:'#888';return`<div class="week-allday-chip" style="background:${c}" onclick="openEventDetail(${ev.id})">${esc(ev.title)}</div>`;}).join('')}</div>`;
  }).join('');

  // scrollable body
  const scroll=document.createElement('div');scroll.className='week-scroll';
  const bodyGrid=document.createElement('div');bodyGrid.className='week-body-grid';

  // time labels
  const timeCol=document.createElement('div');timeCol.className='week-time-col';
  for(let h=startHour;h<=endHour;h++){const lbl=document.createElement('div');lbl.className='week-hour-lbl';if(h<24)lbl.textContent=fmt12(pad(h)+':00');timeCol.appendChild(lbl);}
  bodyGrid.appendChild(timeCol);

  days.forEach(d=>{
    const ds=fmtDate(d),isT=ds===ts;
    const col=document.createElement('div');col.className='week-day-col'+(isT?' wctoday':'');col.style.height=totalPx+'px';
    for(let h=startHour;h<endHour;h++){const bg=document.createElement('div');bg.className='week-hour-bg';col.appendChild(bg);}
    const dayEvs=S.events.filter(e=>e.date===ds&&vis.has(e.calId)&&e.time).sort((a,b)=>a.time.localeCompare(b.time));
    const placed=[];
    dayEvs.forEach(ev=>{
      const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
      const sm=timeToMins(ev.time);const dur=ev.durationMins||60;const em=sm+dur;
      const top=((sm/60)-startHour)*PX_PER_HOUR;const height=Math.max((dur/60)*PX_PER_HOUR-2,18);
      let c=0;while(placed.some(p=>p.c===c&&p.em>sm&&p.sm<em))c++;
      placed.push({sm,em,c});
      const maxC=placed.filter(p=>p.em>sm&&p.sm<em).reduce((mx,p)=>Math.max(mx,p.c+1),1);
      const evEl=document.createElement('div');evEl.className='week-ev';evEl.style.background=color;
      evEl.style.cssText+=`;top:${top}px;height:${height}px;left:${2+c*(96/maxC)}%;width:calc(${96/maxC}% - 2px)`;
      evEl.innerHTML=`<div class="week-ev-time">${fmt12(ev.time)}</div>${esc(ev.title)}`;
      evEl.onclick=e=>{e.stopPropagation();openEventDetail(ev.id);};
      col.appendChild(evEl);
    });
    col.addEventListener('click',()=>openDayPreview(ds));
    bodyGrid.appendChild(col);
  });
  scroll.appendChild(bodyGrid);
  setTimeout(()=>{scroll.scrollTop=Math.max(0,(startHour-1)*PX_PER_HOUR);},50);

  el.innerHTML='';
  const wrap=document.createElement('div');wrap.className='week-wrap';
  wrap.appendChild(hdrGrid);wrap.appendChild(allDayGrid);wrap.appendChild(scroll);
  el.appendChild(wrap);
}

// â”€â”€ MONTH â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderMonth(){
  const el=document.getElementById('mainContent');
  const vis=visCals(),ts=todayStr();
  const first=new Date(navYear,navMonth,1).getDay();
  const dim=new Date(navYear,navMonth+1,0).getDate();
  const dimp=new Date(navYear,navMonth,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++){const mo=navMonth===0?11:navMonth-1;const yr=navMonth===0?navYear-1:navYear;cells.push({day:dimp-first+1+i,month:mo,year:yr,other:true});}
  for(let i=1;i<=dim;i++)cells.push({day:i,month:navMonth,year:navYear,other:false});
  while(cells.length<42){const d=cells.length-first-dim+1;const mo=navMonth===11?0:navMonth+1;const yr=navMonth===11?navYear+1:navYear;cells.push({day:d,month:mo,year:yr,other:true});}
  el.innerHTML=`<div class="month-wrap"><div class="mhdr">${SHORT.map(d=>`<div class="mhdr-cell">${d}</div>`).join('')}</div><div class="mgrid" id="mgrid"></div></div>`;
  const grid=document.getElementById('mgrid');
  cells.forEach(c=>{
    const ds=`${c.year}-${pad(c.month+1)}-${pad(c.day)}`;const isT=ds===ts;
    const dayEvs=S.events.filter(e=>e.date===ds&&vis.has(e.calId)).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const cell=document.createElement('div');cell.className='mcell'+(c.other?' mother':'')+(isT?' mtoday':'');
    cell.innerHTML=`<div class="mday">${c.day}</div>`;
    // show up to 3 chips, then "+N more" â€” clicking either opens day preview
    dayEvs.slice(0,3).forEach(ev=>{
      const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
      const chip=document.createElement('div');chip.className='mchip';chip.style.background=color;
      chip.textContent=(ev.time?fmt12(ev.time)+' ':'')+ev.title;
      chip.onclick=e=>{e.stopPropagation();openEventDetail(ev.id);};
      cell.appendChild(chip);
    });
    if(dayEvs.length>3){const m=document.createElement('div');m.className='mmore';m.textContent=`+${dayEvs.length-3} more`;m.onclick=e=>{e.stopPropagation();openDayPreview(ds);};cell.appendChild(m);}
    cell.addEventListener('click',()=>openDayPreview(ds));
    grid.appendChild(cell);
  });
}

// â”€â”€ DAY PREVIEW MODAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function openDayPreview(ds){
  const vis=visCals();
  const evs=S.events.filter(e=>e.date===ds&&vis.has(e.calId)).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const d=new Date(ds+'T12:00:00');
  const title=`${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  const bg=modal('');
  const m=bg.querySelector('.modal');m.style.width='560px';m.innerHTML='';
  // header row
  const hdr=document.createElement('div');hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:16px';
  hdr.innerHTML=`<div style="font-family:var(--font-display);font-size:20px;color:var(--text)">${title}</div><div style="display:flex;gap:8px"><button class="mbtn" style="font-size:12px;padding:5px 12px" onclick="closeModal();openAddEvent('${ds}')">+ Add event</button><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  m.appendChild(hdr);
  if(!evs.length){const emp=document.createElement('div');emp.className='no-events';emp.style.padding='30px 0';emp.innerHTML='<div style="font-size:24px">ðŸ—“</div><div>No events this day</div>';m.appendChild(emp);}
  else{
    m.appendChild(buildTimeline(evs));
    const bd=buildBreakdown(evs);if(bd)m.appendChild(bd);
  }
}

// â”€â”€ NOTES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderNotes(){
  const el=document.getElementById('mainContent');el.innerHTML='';
  const layout=document.createElement('div');layout.className='split-layout';
  const sb=document.createElement('div');sb.className='split-sidebar';sb.innerHTML='<h2>Notes</h2>';
  if(!S.notes.length)sb.innerHTML+='<div style="font-size:12px;color:var(--text3);padding:6px 2px">No notes yet</div>';
  S.notes.slice().reverse().forEach(note=>{
    const item=document.createElement('div');item.className='note-item'+(activeNoteId===note.id?' active':'');
    const preview=(note.body||'').replace(/\n/g,' ').substring(0,50);
    item.innerHTML=`<div class="note-item-title">${esc(note.title||'Untitled')}</div><div class="note-item-preview">${esc(preview)||'No content'}</div><div class="note-item-date">${note.updated||''}</div>`;
    item.onclick=()=>{activeNoteId=note.id;renderNotes();};sb.appendChild(item);
  });
  const nb=document.createElement('button');nb.className='new-side-btn';nb.textContent='+ New note';nb.onclick=createNote;sb.appendChild(nb);
  const editor=document.createElement('div');editor.className='split-main';
  const note=S.notes.find(n=>n.id===activeNoteId);
  if(!note)editor.innerHTML='<div class="split-placeholder"><div style="font-size:28px">âœŽ</div><div>Select a note or create one</div></div>';
  else{
    editor.innerHTML=`<div class="note-topbar"><input class="note-title-inp" id="noteTitleInp" placeholder="Title" value="${esc(note.title||'')}"><button class="note-del-btn" onclick="deleteNote(${note.id})">Delete</button></div><textarea class="note-body-inp" id="noteBodyInp" placeholder="Start writingâ€¦">${esc(note.body||'')}</textarea><div class="note-saved" id="noteSavedLbl">Saved</div>`;
    setTimeout(()=>{const ti=document.getElementById('noteTitleInp'),bi=document.getElementById('noteBodyInp');if(ti)ti.addEventListener('input',scheduleNoteSave);if(bi)bi.addEventListener('input',scheduleNoteSave);},0);
  }
  layout.appendChild(sb);layout.appendChild(editor);el.appendChild(layout);
}
function scheduleNoteSave(){
  const lbl=document.getElementById('noteSavedLbl');if(lbl)lbl.textContent='Savingâ€¦';
  clearTimeout(noteSaveTimer);
  noteSaveTimer=setTimeout(()=>{
    const note=S.notes.find(n=>n.id===activeNoteId);if(!note)return;
    const ti=document.getElementById('noteTitleInp'),bi=document.getElementById('noteBodyInp');
    if(ti)note.title=ti.value;if(bi)note.body=bi.value;note.updated=new Date().toLocaleDateString();
    persist();if(lbl)lbl.textContent='Saved';
  },600);
}
function createNote(){const note={id:S.nextNoteId++,title:'',body:'',updated:new Date().toLocaleDateString()};S.notes.push(note);activeNoteId=note.id;persist();renderNotes();setTimeout(()=>{const ti=document.getElementById('noteTitleInp');if(ti)ti.focus();},50);}
function deleteNote(id){S.notes=S.notes.filter(n=>n.id!==id);if(activeNoteId===id)activeNoteId=S.notes.length?S.notes[S.notes.length-1].id:null;persist();renderNotes();}

// â”€â”€ TO-DO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderTodo(){
  const el=document.getElementById('mainContent');el.innerHTML='';
  const layout=document.createElement('div');layout.className='split-layout';
  const sb=document.createElement('div');sb.className='split-sidebar';sb.innerHTML='<h2>Lists</h2>';
  S.todoLists.forEach(list=>{
    const count=S.todos.filter(t=>t.listId===list.id&&!t.done).length;
    const item=document.createElement('div');item.className='tlist-item'+(activeTodoListId===list.id?' active':'');
    item.innerHTML=`<div class="tlist-dot" style="background:${list.color}"></div><div class="tlist-name">${esc(list.name)}</div><div class="tlist-count">${count||''}</div>`;
    item.onclick=()=>{activeTodoListId=list.id;renderTodo();};sb.appendChild(item);
  });
  const nb=document.createElement('button');nb.className='new-side-btn';nb.textContent='+ New list';nb.onclick=openNewTodoList;sb.appendChild(nb);
  const main=document.createElement('div');main.className='split-main';
  const list=S.todoLists.find(l=>l.id===activeTodoListId);
  if(!list)main.innerHTML='<div class="split-placeholder"><div style="font-size:28px">âœ“</div><div>Select or create a list</div></div>';
  else{
    const todos=S.todos.filter(t=>t.listId===list.id);
    const open=todos.filter(t=>!t.done),done=todos.filter(t=>t.done);
    main.innerHTML=`<div class="todo-topbar"><div class="todo-list-title" style="color:${list.color}">${esc(list.name)}</div><button class="todo-list-edit" onclick="openEditTodoList(${list.id})">Edit list</button></div><div class="todo-items" id="todoItems"></div><div class="todo-add-row"><input class="todo-add-inp" id="todoAddInp" placeholder="Add a taskâ€¦ (press Enter)" onkeydown="if(event.key==='Enter')addTodoItem()"><button class="todo-add-btn" onclick="addTodoItem()">Add</button></div>`;
    setTimeout(()=>{
      const container=document.getElementById('todoItems');if(!container)return;
      const all=[...open,...done];
      if(!all.length){container.innerHTML='<div style="text-align:center;color:var(--text3);padding:30px;font-size:13px">No tasks yet</div>';return;}
      all.forEach(todo=>{const row=document.createElement('div');row.className='todo-item';row.innerHTML=`<div class="todo-cb${todo.done?' checked':''}" onclick="toggleTodo(${todo.id})"></div><div class="todo-text${todo.done?' done':''}">${esc(todo.text)}</div><button class="todo-del" onclick="deleteTodo(${todo.id})">âœ•</button>`;container.appendChild(row);});
    },0);
  }
  layout.appendChild(sb);layout.appendChild(main);el.appendChild(layout);
}
function addTodoItem(){const inp=document.getElementById('todoAddInp');if(!inp)return;const text=inp.value.trim();if(!text||!activeTodoListId)return;S.todos.push({id:S.nextTodoId++,listId:activeTodoListId,text,done:false});inp.value='';persist();renderTodo();setTimeout(()=>{const i=document.getElementById('todoAddInp');if(i)i.focus();},30);}
function toggleTodo(id){const t=S.todos.find(t=>t.id===id);if(t){t.done=!t.done;persist();renderTodo();}}
function deleteTodo(id){S.todos=S.todos.filter(t=>t.id!==id);persist();renderTodo();}
function openNewTodoList(){const def=PALETTE[S.todoLists.length%PALETTE.length];modal(`<h3>New list</h3><div class="frow"><label>Name</label><input id="tlName" type="text" placeholder="e.g. Shopping, Work Tasksâ€¦"/></div><div class="frow"><label>Color</label>${colorPickerHTML(def)}</div><div class="modal-actions"><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="createTodoList()">Create</button></div>`);setTimeout(()=>document.getElementById('tlName').focus(),50);}
function createTodoList(){const name=document.getElementById('tlName').value.trim();if(!name){document.getElementById('tlName').classList.add('err');return;}S.todoLists.push({id:S.nextTodoListId++,name,color:document.getElementById('pickedColor').value});activeTodoListId=S.todoLists[S.todoLists.length-1].id;persist();closeModal();renderTodo();}
function openEditTodoList(id){const list=S.todoLists.find(l=>l.id===id);if(!list)return;modal(`<h3>Edit list</h3><div class="frow"><label>Name</label><input id="tlName" type="text" value="${esc(list.name)}"/></div><div class="frow"><label>Color</label>${colorPickerHTML(list.color)}</div><div class="modal-actions"><button class="mbtn mbtn-danger" onclick="deleteTodoList(${id})">Delete list</button><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="saveTodoList(${id})">Save</button></div>`);setTimeout(()=>document.getElementById('tlName').focus(),50);}
function saveTodoList(id){const list=S.todoLists.find(l=>l.id===id);const name=document.getElementById('tlName').value.trim();if(!name){document.getElementById('tlName').classList.add('err');return;}list.name=name;list.color=document.getElementById('pickedColor').value;persist();closeModal();renderTodo();}
function deleteTodoList(id){if(!confirm('Delete this list and all its tasks?'))return;S.todoLists=S.todoLists.filter(l=>l.id!==id);S.todos=S.todos.filter(t=>t.listId!==id);if(activeTodoListId===id)activeTodoListId=S.todoLists[0]?.id||null;persist();closeModal();renderTodo();}

// â”€â”€ VIEW CONTROL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function setView(v){
  view=v;
  ['today','week','month','todo','notes'].forEach(n=>{const cap=n.charAt(0).toUpperCase()+n.slice(1);document.getElementById('tab'+cap).classList.toggle('active',v===n);document.getElementById('side'+cap).classList.toggle('active',v===n);});
  document.getElementById('periodNav').style.display=(v==='week'||v==='month')?'flex':'none';
  updatePeriodLabel();
  document.getElementById('topAddBtn').textContent=v==='notes'?'+ New note':v==='todo'?'+ New list':'+ Add event';
  renderMain();
}
function topAdd(){if(view==='notes')createNote();else if(view==='todo')openNewTodoList();else openAddEvent();}
function renderMain(){if(view==='today')renderToday();else if(view==='week')renderWeek();else if(view==='month')renderMonth();else if(view==='notes')renderNotes();else if(view==='todo')renderTodo();}
function renderAll(){renderSidebar();renderMain();}
function updatePeriodLabel(){const el=document.getElementById('periodLabel');if(view==='month')el.textContent=MONTHS[navMonth]+' '+navYear;else if(view==='week'){const end=addDays(navWeekStart,6);el.textContent=fmtShort(navWeekStart)+' â€“ '+fmtShort(end);}}
function shiftPeriod(d){if(view==='month'){navMonth+=d;if(navMonth<0){navMonth=11;navYear--;}if(navMonth>11){navMonth=0;navYear++;}}else if(view==='week'){navWeekStart=addDays(navWeekStart,d*7);}updatePeriodLabel();renderMain();}
function jumpToday(){navYear=TODAY.getFullYear();navMonth=TODAY.getMonth();navWeekStart=weekStart(TODAY);updatePeriodLabel();renderMain();}

// â”€â”€ ADD EVENT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function openAddEvent(prefill){
  const date=prefill||todayStr();
  const opts=S.calendars.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  modal(`<h3>Add event</h3>
    <div class="frow"><label>Title</label><input id="evTitle" type="text" placeholder="Event name"/></div>
    <div class="frow"><label>Calendar</label><select id="evCal">${opts}</select></div>
    <div class="frow"><label>Date</label><input id="evDate" type="date" value="${date}"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="frow"><label>Start time</label><input id="evTime" type="time" value="09:00"/></div>
      <div class="frow"><label>End time</label><input id="evEndTime" type="time" value="10:00"/></div>
    </div>
    <div class="frow"><label>Location</label><input id="evLoc" type="text" placeholder="Optional"/></div>
    <div class="frow"><label>Description</label><textarea id="evDesc" placeholder="Details, links, notesâ€¦"></textarea></div>
    <div class="modal-actions"><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="saveEvent()">Save event</button></div>`);
  setTimeout(()=>document.getElementById('evTitle').focus(),50);
}
function saveEvent(){
  const t=document.getElementById('evTitle').value.trim();if(!t){document.getElementById('evTitle').classList.add('err');return;}
  const st=document.getElementById('evTime').value,et=document.getElementById('evEndTime').value;
  const dur=st&&et?Math.max(15,(timeToMins(et)-timeToMins(st))):60;

// â”€â”€ ICS PARSER â€” fully timezone-aware, no event limits â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function parseICS(raw,calId){
  // Step 1: normalize + unfold RFC 5545 folded lines
  const text=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n[ \t]/g,'');

  // Step 2: read VTIMEZONE blocks to build tzidâ†’offset map
  // We read both STANDARD and DAYLIGHT components and pick the one
  // whose DTSTART is most recently before today, so DST is handled correctly.
  const tzMap={};
  const vtBlocks=text.split(/BEGIN:VTIMEZONE/i).slice(1);
  vtBlocks.forEach(vt=>{
    const end=vt.search(/END:VTIMEZONE/i);
    const vtBlock=end>-1?vt.substring(0,end):vt;
    const tzidM=vtBlock.match(/^TZID:(.+)$/im);if(!tzidM)return;
    const tzid=tzidM[1].trim();
    // collect all STANDARD and DAYLIGHT sub-components
    const components=[];
    ['STANDARD','DAYLIGHT'].forEach(type=>{
      const re=new RegExp('BEGIN:'+type+'([\\s\\S]*?)END:'+type,'gi');
      let m;while((m=re.exec(vtBlock))!==null){
        const block=m[1];
        const offM=block.match(/^TZOFFSETTO:([+\-]\d{4,6})$/im);
        const dtM=block.match(/^DTSTART:(\d{8}T\d{6})$/im);
        if(!offM)return;
        const offStr=offM[1];
        const sign=offStr[0]==='-'?-1:1;
        const oh=parseInt(offStr.slice(1,3)),om=parseInt(offStr.slice(3,5));
        const offsetMins=sign*(oh*60+om);
        let dtStart=0;
        if(dtM){const v=dtM[1];dtStart=new Date(parseInt(v.slice(0,4)),parseInt(v.slice(4,6))-1,parseInt(v.slice(6,8)),parseInt(v.slice(9,11)),parseInt(v.slice(11,13))).getTime();}
        components.push({type,offsetMins,dtStart});
      }
    });
    if(!components.length)return;
    // pick the component whose dtStart is closest before now
    const now=Date.now();
    const past=components.filter(c=>c.dtStart<=now).sort((a,b)=>b.dtStart-a.dtStart);
    tzMap[tzid]=(past.length?past[0]:components[0]).offsetMins;
  });

  // Step 3: parse a single DTSTART/DTEND value string + its params â†’ local JS Date
  function parseDTVal(val,params){
    params=params||'';
    // All-day: VALUE=DATE (without DATE-TIME) or bare 8 digits
    const isAllDay=(params.toUpperCase().includes('VALUE=DATE')&&!params.toUpperCase().includes('DATE-TIME'))||/^\d{8}$/.test(val.trim());
    if(isAllDay){
      const v=val.replace(/\D/g,'');
      // Return a midnight local Date so the date string is always correct
      return{date:new Date(parseInt(v.slice(0,4)),parseInt(v.slice(4,6))-1,parseInt(v.slice(6,8))),isAllDay:true};
    }
    // timed
    const v=val.replace(/[^0-9Z]/gi,'');
    if(v.length<12)return null;
    const yr=parseInt(v.slice(0,4)),mo=parseInt(v.slice(4,6))-1,dy=parseInt(v.slice(6,8));
    const hh=parseInt(v.slice(8,10)),mm=parseInt(v.slice(10,12)),ss=parseInt(v.slice(12,14)||'0');
    const isUTC=val.trimEnd().toUpperCase().endsWith('Z');
    const tzidM=params.match(/TZID=([^;:]+)/i);
    const tzid=tzidM?tzidM[1].trim():'';
    let d;
    if(isUTC){
      // UTC: use Date.UTC so browser converts to local
      d=new Date(Date.UTC(yr,mo,dy,hh,mm,ss));
    } else if(tzid&&tzMap[tzid]!==undefined){
      // named tz: wall-clock ms - offset = UTC ms, then create Date
      const wallMs=Date.UTC(yr,mo,dy,hh,mm,ss);
      d=new Date(wallMs-tzMap[tzid]*60000);
    } else {
      // floating: treat as local time (no conversion)
      d=new Date(yr,mo,dy,hh,mm,ss);
    }
    return{date:d,isAllDay:false};
  }

  // Step 4: parse every VEVENT â€” NO artificial limit
  const result=[];
  let id=S.nextEvId;
  // split on BEGIN:VEVENT case-insensitively
  const blocks=text.split(/BEGIN:VEVENT/i).slice(1).map(b=>{
    const ei=b.search(/END:VEVENT/i);return ei>-1?b.substring(0,ei):b;
  });

  blocks.forEach(block=>{
    const lines=block.split('\n');

    // getProp: returns {params, value} for first matching property name
    function getProp(key){
      for(const line of lines){
        if(!line.trim())continue;
        const ci=line.indexOf(':');if(ci<0)continue;
        const head=line.slice(0,ci);
        const propName=head.split(';')[0].trim().toUpperCase();
        if(propName===key.toUpperCase()){
          return{params:head.slice(propName.length),value:line.slice(ci+1)};
        }
      }
      return null;
    }
    function getVal(key){const p=getProp(key);return p?p.value.trim():'';}
    function getAllProps(key){
      return lines.map(line=>{
        if(!line.trim())return null;
        const ci=line.indexOf(':');if(ci<0)return null;
        const head=line.slice(0,ci);
        const propName=head.split(';')[0].trim().toUpperCase();
        return propName===key.toUpperCase()?{params:head.slice(propName.length),value:line.slice(ci+1)}:null;
      }).filter(Boolean);
    }
    const dec=s=>String(s||'').replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\').trim();

    const summary=dec(getVal('SUMMARY'));
    const dtstartProp=getProp('DTSTART');
    if(!summary||!dtstartProp)return;

    const startParsed=parseDTVal(dtstartProp.value,dtstartProp.params);
    if(!startParsed)return;

    const startDate=startParsed.date;
    const isAllDay=startParsed.isAllDay;

    // Format local date string correctly
    const ds=`${startDate.getFullYear()}-${pad(startDate.getMonth()+1)}-${pad(startDate.getDate())}`;
    const time=isAllDay?'':(`${pad(startDate.getHours())}:${pad(startDate.getMinutes())}`);

    // End time / duration
    let endTime='',durationMins=60;
    const dtendProp=getProp('DTEND');
    if(dtendProp&&!isAllDay){
      const endParsed=parseDTVal(dtendProp.value,dtendProp.params);
      if(endParsed&&!endParsed.isAllDay){
        const ed=endParsed.date;
        endTime=`${pad(ed.getHours())}:${pad(ed.getMinutes())}`;
        durationMins=Math.max(5,Math.round((ed.getTime()-startDate.getTime())/60000));
      }
    }
    if(!endTime&&!isAllDay){
      const durVal=getVal('DURATION');
      if(durVal){
        const dm=durVal.match(/P(?:(\d+)W)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?/i);
        if(dm){
          const weeks=(dm[1]?parseInt(dm[1]):0)*7*24*60;
          const days=(dm[2]?parseInt(dm[2]):0)*24*60;
          const hours=(dm[3]?parseInt(dm[3]):0)*60;
          const mins=dm[4]?parseInt(dm[4]):0;
          durationMins=weeks+days+hours+mins||60;
        }
      } else durationMins=60;
      if(time){const sm=timeToMins(time)+durationMins;endTime=`${pad(Math.floor(sm/60)%24)}:${pad(sm%60)}`;}
    }

    // Meta fields
    const uid=getVal('UID');
    const description=dec(getVal('DESCRIPTION'));
    const location=dec(getVal('LOCATION'));
    const url=getVal('URL');
    const status=getVal('STATUS');

    const orgProp=getProp('ORGANIZER');
    let organizer='';
    if(orgProp){
      const cn=(orgProp.params.match(/CN=([^;:]+)/i)||[])[1]||'';
      const email=(orgProp.value.match(/mailto:(.+)/i)||[])[1]||'';
      organizer=dec(cn||email);
    }

    const attendees=getAllProps('ATTENDEE').map(p=>{
      const cn=(p.params.match(/CN=([^;:]+)/i)||[])[1]||'';
      const email=(p.value.match(/mailto:(.+)/i)||[])[1]||'';
      return dec(cn||email);
    }).filter(Boolean).slice(0,20);

    result.push({id:id++,uid,title:summary,date:ds,time,endTime,durationMins,calId,description,location,url,status,organizer,attendees,notes:''});
  });

  return result;
}

<script>
(()=>{
  const FALLBACK_TZ='America/Los_Angeles';
  const WEEKDAY_CODES=['SU','MO','TU','WE','TH','FR','SA'];
  const DAY_MS=86400000;
  const travelCache=new Map();
  const tzFormatterCache=new Map();
  const oldRenderAll=renderAll;

  function luminanceText(hex){
    if(!validHex(hex))return '#fff';
    const h=hex.slice(1),r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return (0.299*r+0.587*g+0.114*b)>176?'#111':'#fff';
  }
  function getEventColor(ev){return validHex(ev.color)?ev.color:(getCal(ev.calId)?.color||'#888');}
  function eventEndMins(ev){return (timeToMins(ev.time)||0)+(ev.durationMins||computeDuration(ev.time,ev.endTime)||60);}
  function minsToTime(mins){const total=((mins%(24*60))+(24*60))%(24*60);return `${pad(Math.floor(total/60))}:${pad(total%60)}`;}
  function durationLabel(mins){const h=Math.floor(mins/60),m=mins%60;return h?(m?`${h}h ${m}m`:`${h}h`):`${m}m`;}

  async function estimateDriveMinutes(from,to){
    const geocode=async place=>{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(place)}`);
      if(!res.ok)throw new Error('geo');
      const data=await res.json();
      if(!data[0])throw new Error('miss');
      return {lat:data[0].lat,lon:data[0].lon};
    };
    const [a,b]=await Promise.all([geocode(from),geocode(to)]);
    const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`);
