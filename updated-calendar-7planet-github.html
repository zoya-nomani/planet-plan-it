    const title=document.getElementById('todoTitle'),text=title.value.trim();if(!text){title.classList.add('err');return;}
    const payload={listId:Number(document.getElementById('todoListSel').value),text,done:id?S.todos.find(t=>t.id===id)?.done:false,location:document.getElementById('todoLocation').value.trim(),deadline:document.getElementById('todoDeadline').value,estMinutes:Number(document.getElementById('todoMinutes').value)||0,description:document.getElementById('todoDescription').value.trim()};
    if(id){Object.assign(S.todos.find(t=>t.id===id),payload);}else{S.todos.push({id:S.nextTodoId++,...payload});if(document.getElementById('todoAddInp'))document.getElementById('todoAddInp').value='';}
    persist();closeModal();renderTodo();
  };
  topAdd=function(){if(view==='notes')createNote();else if(view==='todo')openTodoItemModal();else openEventEditor();};

  window.openEventEditor=function(id=null,prefillDate=''){
    const ev=id?S.events.find(e=>e.id===id):null,date=ev?.date||prefillDate||todayStr(),calId=ev?.calId||S.calendars[0]?.id||1,baseColor=getCal(calId)?.color||'#3B82F6',customColor=ev?.color||baseColor;
    modal(`<h3>${ev?'Edit event':'Add event'}</h3><input type="hidden" id="editingEventId" value="${ev?ev.id:''}"><div class="frow"><label>Title</label><input id="evTitle" type="text" value="${esc(ev?.title||'')}" placeholder="Event name"></div><div class="frow-grid"><div class="frow"><label>Calendar</label><select id="evCal">${S.calendars.map(cal=>`<option value="${cal.id}" ${cal.id===calId?'selected':''}>${esc(cal.name)}</option>`).join('')}</select></div><div class="frow"><label>Date</label><input id="evDate" type="date" value="${date}"></div></div><div class="frow-grid"><div class="frow"><label>Start time</label><input id="evTime" type="time" value="${esc(ev?.time||'09:00')}"></div><div class="frow"><label>End time</label><input id="evEndTime" type="time" value="${esc(ev?.endTime||'10:00')}"></div></div><div class="frow-grid"><div class="frow"><label>Location</label><input id="evLoc" type="text" value="${esc(ev?.location||'')}" placeholder="Optional"></div><div class="frow"><label>Link</label><input id="evUrl" type="url" value="${esc(ev?.url||'')}" placeholder="Optional"></div></div><div class="frow"><label>Event color</label><select id="evColorMode" onchange="document.getElementById('eventColorWrap').style.display=this.value==='custom'?'block':'none'"><option value="calendar" ${ev?.color?'':'selected'}>Use calendar color</option><option value="custom" ${ev?.color?'selected':''}>Custom event color</option></select></div><div class="frow" id="eventColorWrap" style="display:${ev?.color?'block':'none'}"><label>Custom color</label>${colorPickerHTML(customColor)}</div><div class="frow"><label>Description</label><textarea id="evDesc" placeholder="Details, links, notes...">${esc(ev?.description||'')}</textarea></div><div class="modal-actions">${ev?`<button class="mbtn mbtn-danger" onclick="deleteEvent(${ev.id})">Delete</button>`:''}<button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="saveEvent()">Save event</button></div>`);
  };
  openAddEvent=function(prefill){openEventEditor(null,prefill||'');};
  saveEvent=function(){
    const title=document.getElementById('evTitle'),text=title.value.trim();if(!text){title.classList.add('err');return;}
    const id=Number(document.getElementById('editingEventId').value)||0,start=document.getElementById('evTime').value,end=document.getElementById('evEndTime').value,duration=Math.max(15,computeDuration(start,end)||60),existing=id?S.events.find(e=>e.id===id):null;
    const payload={title:text,date:document.getElementById('evDate').value,time:start,endTime:end||minsToTime((timeToMins(start)||0)+duration),durationMins:duration,calId:Number(document.getElementById('evCal').value),color:document.getElementById('evColorMode').value==='custom'?document.getElementById('pickedColor').value:'',location:document.getElementById('evLoc').value.trim(),url:document.getElementById('evUrl').value.trim(),description:document.getElementById('evDesc').value.trim(),notes:existing?.notes||'',organizer:existing?.organizer||'',attendees:existing?.attendees||[],status:existing?.status||'',uid:existing?.uid||''};
    if(id)Object.assign(existing,payload);else S.events.push({id:S.nextEvId++,...payload});
    persist();closeModal();renderAll();
  };
  openEventDetail=function(id){
    const ev=S.events.find(e=>e.id===id);if(!ev)return;const color=getEventColor(ev),cal=getCal(ev.calId),badgeText=luminanceText(color);
    let rows='';if(ev.location)rows+=`<div class="ev-info-key">Location</div><div class="ev-info-val"><a href="${mapsSearchLink(ev.location)}" target="_blank" rel="noopener">${esc(ev.location)}</a></div>`;if(ev.organizer)rows+=`<div class="ev-info-key">Organizer</div><div class="ev-info-val">${esc(ev.organizer)}</div>`;if(ev.attendees?.length)rows+=`<div class="ev-info-key">Attendees</div><div class="ev-info-val">${ev.attendees.map(esc).join(', ')}</div>`;if(ev.url)rows+=`<div class="ev-info-key">Link</div><div class="ev-info-val"><a href="${esc(ev.url)}" target="_blank" rel="noopener">${esc(ev.url)}</a></div>`;
    modal(`<div class="ev-hdr"><div class="ev-color-dot" style="background:${color}"></div><div class="ev-title-txt">${esc(ev.title)}</div></div><div class="ev-meta">${ev.date} · ${eventTimeLabel(ev)}</div><div class="ev-badge" style="background:${hex2rgba(color,.16)};color:${badgeText}"><span style="width:6px;height:6px;border-radius:50%;background:${color};display:inline-block"></span>${esc(cal?.name||'')}</div>${rows?`<div class="ev-section"><div class="ev-section-label">Event details</div><div class="ev-info-grid">${rows}</div></div>`:''}${ev.description?`<div class="ev-section"><div class="ev-section-label">Description</div><div class="ev-section-body">${linkify(ev.description)}</div></div>`:''}<div class="ev-section"><div class="ev-section-label">My notes</div><textarea class="ev-notes-ta" id="evNotesTa" placeholder="Add your own notes...">${esc(ev.notes||'')}</textarea></div><div class="modal-actions"><button class="mbtn mbtn-danger" onclick="deleteEvent(${ev.id})">Delete</button><button class="mbtn" onclick="openEventEditor(${ev.id})">Edit</button><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn mbtn-primary" onclick="saveEvNotes(${ev.id})">Save notes</button></div>`);
  };
  function supportsTimeZone(tz){try{new Intl.DateTimeFormat('en-US',{timeZone:tz}).format(new Date());return true;}catch{return false;}}
  function normalizeTZID(tz){const raw=String(tz||'').replace(/^"|"$/g,'').trim();if(!raw)return '';if(['US/Pacific','US-Pacific','PST8PDT','Pacific Standard Time'].includes(raw))return FALLBACK_TZ;return supportsTimeZone(raw)?raw:FALLBACK_TZ;}
  function getFormatter(tz){if(!tzFormatterCache.has(tz))tzFormatterCache.set(tz,new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23'}));return tzFormatterCache.get(tz);}
  function getZoneParts(date,tz=FALLBACK_TZ){const map={};getFormatter(tz).formatToParts(date).forEach(part=>{if(part.type!=='literal')map[part.type]=part.value;});return map;}
  function formatDateInZone(date,tz=FALLBACK_TZ){const p=getZoneParts(date,tz);return `${p.year}-${p.month}-${p.day}`;}
  function formatTimeInZone(date,tz=FALLBACK_TZ){const p=getZoneParts(date,tz);return `${p.hour}:${p.minute}`;}
  function getOffsetMs(date,tz){const parts=getFormatter(tz).formatToParts(date),map={};parts.forEach(part=>{if(part.type!=='literal')map[part.type]=part.value;});const utc=Date.UTC(+map.year,+map.month-1,+map.day,+map.hour,+map.minute,+map.second);return utc-date.getTime();}
  function zonedPartsToDate(parts,tz){const base=Date.UTC(parts.y,parts.mo-1,parts.d,parts.h,parts.mi,parts.s);let guess=new Date(base);for(let i=0;i<3;i++){const next=new Date(base-getOffsetMs(guess,tz));if(Math.abs(next-guess)<1000)return next;guess=next;}return guess;}
  function parseICSTime(value,params=''){const raw=String(value||'').trim(),isAllDay=(params.toUpperCase().includes('VALUE=DATE')&&!params.toUpperCase().includes('DATE-TIME'))||/^\d{8}$/.test(raw);if(isAllDay)return {date:new Date(+raw.slice(0,4),+raw.slice(4,6)-1,+raw.slice(6,8)),isAllDay:true};const digits=raw.replace(/[^0-9Z]/gi,'');if(digits.length<12)return null;const p={y:+digits.slice(0,4),mo:+digits.slice(4,6),d:+digits.slice(6,8),h:+digits.slice(8,10),mi:+digits.slice(10,12),s:+(digits.slice(12,14)||0)};if(raw.toUpperCase().endsWith('Z'))return {date:new Date(Date.UTC(p.y,p.mo-1,p.d,p.h,p.mi,p.s)),isAllDay:false};const tzidMatch=params.match(/TZID=([^;:]+)/i),tz=normalizeTZID(tzidMatch?tzidMatch[1]:FALLBACK_TZ);return {date:zonedPartsToDate(p,tz||FALLBACK_TZ),isAllDay:false};}
  function parseDuration(value){const m=String(value||'').match(/P(?:(\d+)W)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?/i);if(!m)return 0;return ((+m[1]||0)*7*24*60)+((+m[2]||0)*24*60)+((+m[3]||0)*60)+(+m[4]||0)+((+m[5]||0)?1:0);}
  function parseRRule(value){if(!value)return null;const rule={interval:1,byday:[]};String(value).split(';').forEach(part=>{const [k,v]=part.split('=');if(!k)return;const key=k.toUpperCase();if(key==='FREQ')rule.freq=v?.toUpperCase();if(key==='INTERVAL')rule.interval=Math.max(1,+v||1);if(key==='COUNT')rule.count=Math.max(1,+v||0);if(key==='BYDAY')rule.byday=(v||'').split(',').map(x=>x.slice(-2).toUpperCase()).filter(Boolean);if(key==='UNTIL')rule.until=parseICSTime(v,'')?.date||null;});return rule.freq?rule:null;}
  function occurrenceKey(date,isAllDay){return `${fmtDate(date)}|${isAllDay?'all-day':minsToTime(date.getHours()*60+date.getMinutes())}`;}
  function parseEventBlock(block){
    const lines=block.split('\n');
    const getProps=key=>lines.map(line=>{const idx=line.indexOf(':');if(idx<0)return null;const head=line.slice(0,idx),name=head.split(';')[0].trim().toUpperCase();return name===key.toUpperCase()?{params:head.slice(name.length),value:line.slice(idx+1)}:null;}).filter(Boolean);
    const getProp=key=>getProps(key)[0]||null;
    const getVal=key=>getProp(key)?.value.trim()||'';
    const dec=s=>String(s||'').replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\').trim();
    const summary=dec(getVal('SUMMARY'));
    const startProp=getProp('DTSTART');
    if(!summary||!startProp)return null;
    const startParsed=parseICSTime(startProp.value,startProp.params);
    if(!startParsed)return null;
    const status=getVal('STATUS').toUpperCase();
    const endProp=getProp('DTEND');
    const endParsed=endProp?parseICSTime(endProp.value,endProp.params):null;
    const duration=startParsed.isAllDay?0:(endParsed&&!endParsed.isAllDay?Math.max(5,Math.round((endParsed.date-startParsed.date)/60000)):parseDuration(getVal('DURATION'))||60);
    const recurrenceProp=getProp('RECURRENCE-ID');
    const recurrenceParsed=recurrenceProp?parseICSTime(recurrenceProp.value,recurrenceProp.params):null;
    const uid=getVal('UID');
    const description=dec(getVal('DESCRIPTION'));
    const location=dec(getVal('LOCATION'));
    const url=getVal('URL');
    const org=getProp('ORGANIZER');
    const organizer=org?dec((org.params.match(/CN=([^;:]+)/i)||[])[1]||((org.value.match(/mailto:(.+)/i)||[])[1]||'')):'';
    const attendees=getProps('ATTENDEE').map(prop=>dec((prop.params.match(/CN=([^;:]+)/i)||[])[1]||((prop.value.match(/mailto:(.+)/i)||[])[1]||''))).filter(Boolean).slice(0,20);
    const exdates=new Set(getProps('EXDATE').flatMap(prop=>String(prop.value||'').split(',').map(v=>parseICSTime(v,prop.params)).filter(Boolean).map(x=>occurrenceKey(x.date,x.isAllDay))));
    return {summary,startParsed,status,endParsed,duration,recurrenceParsed,uid,description,location,url,organizer,attendees,exdates,rrule:parseRRule(getVal('RRULE'))};
  }
  function expandOccurrences(startDate,isAllDay,rule,exdates){
    if(!rule)return exdates.has(occurrenceKey(startDate,isAllDay))?[]:[new Date(startDate)];
    const results=[],max=rule.count||5000,until=rule.until||new Date(Math.max(startDate.getFullYear()+5,TODAY.getFullYear()+5),11,31,23,59,59);
    if(rule.freq==='DAILY'||rule.freq==='WEEKLY'){
      const byday=rule.byday.length?rule.byday:[WEEKDAY_CODES[startDate.getDay()]];
      for(let cursor=new Date(startDate.getFullYear(),startDate.getMonth(),startDate.getDate());cursor<=until&&results.length<max;cursor.setDate(cursor.getDate()+1)){
        const dayCursor=new Date(cursor),daysApart=Math.floor((dayCursor-new Date(startDate.getFullYear(),startDate.getMonth(),startDate.getDate()))/DAY_MS),weeksApart=Math.floor((dayCursor-weekStart(startDate))/(7*DAY_MS));
        if(rule.freq==='DAILY'&&daysApart%rule.interval!==0)continue;
        if(rule.freq==='WEEKLY'&&weeksApart%rule.interval!==0)continue;
        if(!byday.includes(WEEKDAY_CODES[dayCursor.getDay()]))continue;
        const occ=isAllDay?new Date(dayCursor):new Date(dayCursor.getFullYear(),dayCursor.getMonth(),dayCursor.getDate(),startDate.getHours(),startDate.getMinutes(),startDate.getSeconds());
        if(occ<startDate)continue;
        if(!exdates.has(occurrenceKey(occ,isAllDay)))results.push(occ);
      }
    }else{
      let current=new Date(startDate);
      while(current<=until&&results.length<max){
        if(!exdates.has(occurrenceKey(current,isAllDay)))results.push(new Date(current));
        if(rule.freq==='MONTHLY'){const next=new Date(current);next.setDate(1);next.setMonth(next.getMonth()+rule.interval);next.setDate(Math.min(startDate.getDate(),new Date(next.getFullYear(),next.getMonth()+1,0).getDate()));current=isAllDay?new Date(next.getFullYear(),next.getMonth(),next.getDate()):new Date(next.getFullYear(),next.getMonth(),next.getDate(),startDate.getHours(),startDate.getMinutes(),startDate.getSeconds());}
        else if(rule.freq==='YEARLY'){current=new Date(current.getFullYear()+rule.interval,current.getMonth(),current.getDate(),current.getHours(),current.getMinutes(),current.getSeconds());}
        else break;
      }
    }
    return results;
  }
  parseICS=function(raw,calId){
    const text=String(raw||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n[ \t]/g,'');
    const blocks=text.split(/BEGIN:VEVENT/i).slice(1).map(block=>{const end=block.search(/END:VEVENT/i);return end>-1?block.slice(0,end):block;});
    const parsedBlocks=[];
    const parseErrors=[];
    blocks.forEach((block,index)=>{
      try{
        const parsed=parseEventBlock(block);
        if(parsed)parsedBlocks.push(parsed);
      }catch(err){
        parseErrors.push({index,error:err});
      }
    });
    if(parseErrors.length)console.warn('Some calendar events could not be parsed and were skipped.',parseErrors);
    const overrideKeysByUid=new Map();
    parsedBlocks.forEach(item=>{
      if(item.uid&&item.recurrenceParsed){
        if(!overrideKeysByUid.has(item.uid))overrideKeysByUid.set(item.uid,new Set());
        overrideKeysByUid.get(item.uid).add(occurrenceKey(item.recurrenceParsed.date,item.recurrenceParsed.isAllDay));
      }
    });
    const result=[];let nextId=S.nextEvId;
    parsedBlocks.forEach(item=>{
      if(item.status==='CANCELLED'&&!item.recurrenceParsed)return;
      const exclusionSet=new Set(item.exdates);
      (overrideKeysByUid.get(item.uid)||new Set()).forEach(key=>exclusionSet.add(key));
      const starts=item.recurrenceParsed?[item.startParsed.date]:expandOccurrences(item.startParsed.date,item.startParsed.isAllDay,item.rrule,exclusionSet);
      starts.forEach(start=>{
        const date=item.startParsed.isAllDay?fmtDate(start):formatDateInZone(start,FALLBACK_TZ);
        const time=item.startParsed.isAllDay?'':formatTimeInZone(start,FALLBACK_TZ);
        const endDate=new Date(start.getTime()+item.duration*60000);
        const endTime=item.startParsed.isAllDay?'':formatTimeInZone(endDate,FALLBACK_TZ);
        if(item.status==='CANCELLED')return;
        result.push({id:nextId++,uid:item.uid?`${item.uid}__${date}__${time||'all-day'}`:'',title:item.summary,date,time,endTime,durationMins:item.duration,calId,color:'',description:item.description,location:item.location,url:item.url,status:item.status,organizer:item.organizer,attendees:item.attendees,notes:''});
      });
    });
    return result;
  };
  openImportModal=function(){
    const opts=S.calendars.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
    modal(`<h3>Import calendar</h3><div class="frow"><label>Add events to</label><select id="importCal">${opts}</select></div><div class="frow"><label>File</label><button class="mbtn" style="width:100%" onclick="document.getElementById('icsFile').click()">Choose .ics file...</button></div><div class="frow"><label>Calendar link</label><input id="importUrl" type="url" placeholder="Paste an .ics link or public calendar URL"></div><div class="modal-actions"><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn" onclick="importCalendarLink()">Import by link</button></div><div class="tip">Timezone fallback is Los Angeles if the file does not include a usable timezone.</div><div id="importResult" style="font-size:13px;color:var(--text2);margin-top:8px;display:none"></div>`);
  };
  function setImportResultMessage(message){
    const result=document.getElementById('importResult');
    if(result){result.style.display='block';result.textContent=message;}
  }
  function importParsedEvents(parsed){
    const existingUids=new Set(S.events.map(ev=>ev.uid).filter(Boolean));
    const existingKeys=new Set(S.events.map(ev=>`${ev.title}|${ev.date}|${ev.time}|${ev.calId}`));
    let added=0,skipped=0;
    parsed.forEach(ev=>{
      const key=`${ev.title}|${ev.date}|${ev.time}|${ev.calId}`;
      if((ev.uid&&existingUids.has(ev.uid))||(!ev.uid&&existingKeys.has(key))){skipped++;return;}
      S.events.push(ev);
      if(ev.uid)existingUids.add(ev.uid);
      existingKeys.add(key);
      added++;
    });
    persist();
    renderAll();
    return {added,skipped};
  }
  window.importCalendarLink=async function(){
    const url=document.getElementById('importUrl')?.value.trim(),result=document.getElementById('importResult');if(!url)return;
    result.style.display='block';result.textContent='Importing from link...';
    try{
      const res=await fetch(url);if(!res.ok)throw new Error('fetch');
      const parsed=parseICS(await res.text(),Number(document.getElementById('importCal').value));
      if(!parsed.length){result.textContent='That file/link was read, but no calendar events were found.';return;}
      const {added,skipped}=importParsedEvents(parsed);
      result.textContent=`Imported ${added} event${added===1?'':'s'}${skipped?` (${skipped} duplicates skipped)`:''}.`;
    }catch{result.textContent='Could not import that link. The calendar host may block direct downloads from a local HTML file.';}
  };
  const oldInput=document.getElementById('icsFile');
  const newInput=oldInput.cloneNode(true);oldInput.parentNode.replaceChild(newInput,oldInput);
  newInput.addEventListener('change',function(){
    const file=this.files?.[0];if(!file)return;
    setImportResultMessage(`Reading ${file.name}...`);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const parsed=parseICS(e.target.result,Number(document.getElementById('importCal')?.value||S.calendars[0]?.id||1));
        if(!parsed.length){
          setImportResultMessage('The selected file was read, but no usable events were detected. If this came from Google Calendar, make sure you picked the actual `.ics` file and not the `.zip` export.');
          return;
        }
        const {added,skipped}=importParsedEvents(parsed);
        setImportResultMessage(`Imported ${added} event${added===1?'':'s'}${skipped?` (${skipped} duplicates skipped)`:''}.`);
      }catch(err){
        console.error('Calendar import failed',err);
        setImportResultMessage(`The file was selected, but the import failed while parsing it: ${err?.message||'unknown error'}`);
      }
    };
    reader.onerror=()=>setImportResultMessage('The file could not be read.');
    reader.readAsText(file);this.value='';
  });

  renderAll=function(){oldRenderAll();};
  renderAll();
})();



</script>
