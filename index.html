<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=DM+Serif+Display&display=swap" rel="stylesheet"><style>
:root {
  --bg:#F7F6F2; --surface:#FFFFFF; --surface2:#F0EEE8;
  --border:rgba(0,0,0,0.09); --border-med:rgba(0,0,0,0.16);
  --text:#1A1916; --text2:#6B6860; --text3:#A8A69F;
  --radius:10px; --radius-lg:16px;
  --font:'DM Sans',sans-serif; --font-display:'DM Serif Display',serif;
  --shadow:0 2px 12px rgba(0,0,0,0.07); --shadow-lg:0 8px 40px rgba(0,0,0,0.15);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#131210; --surface:#1C1B18; --surface2:#252420;
    --border:rgba(255,255,255,0.07); --border-med:rgba(255,255,255,0.13);
    --text:#F0EEE8; --text2:#9A9890; --text3:#5A5956;
    --shadow:0 2px 12px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.layout{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 14px;overflow-y:auto}
.logo{font-family:var(--font-display);font-size:21px;color:var(--text);margin-bottom:26px;padding-left:4px}
.logo span{color:var(--text3);font-family:var(--font);font-size:11px;font-weight:400;display:block;margin-top:2px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:0 0 5px 8px}
.nav-section{margin-bottom:24px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:13px;color:var(--text2);text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface2);color:var(--text);font-weight:500}
.nav-icon{font-size:13px;width:18px;text-align:center}
.cals-section{flex:1}
.cal-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;transition:background .1s;user-select:none}
.cal-item:hover{background:var(--surface2)}
.cal-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:opacity .15s}
.cal-item.hidden .cal-dot{opacity:.25}
.cal-name{font-size:13px;color:var(--text2);flex:1}
.cal-item.hidden .cal-name{color:var(--text3)}
.cal-edit-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:2px 5px;border-radius:4px;opacity:0;transition:opacity .15s}
.cal-item:hover .cal-edit-btn{opacity:1}
.cal-edit-btn:hover{color:var(--text);background:var(--surface2)}
.new-cal-btn{display:flex;align-items:center;gap:7px;width:100%;background:none;border:1px dashed var(--border-med);padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text3);margin-top:6px;transition:all .15s}
.new-cal-btn:hover{border-color:var(--text3);color:var(--text2);background:var(--surface2)}
.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.footer-btn{display:flex;align-items:center;gap:7px;width:100%;background:none;border:1px solid var(--border-med);padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text2);transition:all .15s}
.footer-btn:hover{background:var(--surface2);color:var(--text)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:10px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.view-tabs{display:flex;background:var(--surface2);border-radius:var(--radius);padding:3px;gap:2px}
.view-tab{background:none;border:none;padding:5px 13px;border-radius:7px;cursor:pointer;font-family:var(--font);font-size:13px;color:var(--text2);transition:all .15s}
.view-tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:var(--shadow)}
.period-nav{display:flex;align-items:center;gap:6px}
.pnav-btn{background:none;border:1px solid var(--border-med);border-radius:8px;width:28px;height:28px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.pnav-btn:hover{background:var(--surface2);color:var(--text)}
.period-label{font-size:14px;font-weight:500;color:var(--text);min-width:170px;text-align:center}
.add-btn{background:var(--text);color:var(--bg);border:none;padding:8px 17px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.83}
.content{flex:1;overflow-y:auto;padding:24px 26px}

/* TODAY */
.today-hdr{margin-bottom:22px}
.today-big{font-family:var(--font-display);font-size:40px;color:var(--text);line-height:1;letter-spacing:-1px}
.today-sub{font-size:13px;color:var(--text3);margin-top:4px}
.no-events{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--text3);text-align:center;gap:8px}
.timeline{display:flex;flex-direction:column;gap:6px}
.tl-ev{display:flex;align-items:stretch;gap:13px;padding:12px 15px;border-radius:var(--radius-lg);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s;border-left-width:4px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.tl-ev:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.tl-time{font-size:11px;color:var(--text3);min-width:54px;padding-top:2px;font-weight:500}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:14px;font-weight:500;color:var(--text)}
.tl-calname{font-size:11px;margin-top:2px;font-weight:500}
.tl-desc{font-size:12px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* WEEK VIEW */
.week-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.week-hdr{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)}
.wdh{padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
.wdh:last-child{border-right:none}
.wdh-name{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.wdh-num{font-size:18px;color:var(--text2);width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:3px auto 0}
.wdh-num.wtoday{background:var(--text);color:var(--bg);font-weight:600}
.week-body{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.wcell{min-height:130px;padding:7px 5px;border-right:1px solid var(--border);cursor:pointer;transition:background .1s}
.wcell:last-child{border-right:none}
.wcell:hover{background:var(--surface2)}
.wcell.wctoday{background:var(--surface2)}
.wchip{display:block;border-radius:4px;padding:3px 6px;font-size:11px;font-weight:500;color:#fff;margin-bottom:3px;cursor:pointer;transition:opacity .1s;line-height:1.3}
.wchip:hover{opacity:.82}
.wchip-time{font-size:10px;opacity:.8;display:block}
.wmore{font-size:10px;color:var(--text3);padding:1px 4px;font-weight:500}

/* MONTH VIEW */
.month-wrap{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.mhdr{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border)}
.mhdr-cell{padding:9px 0;text-align:center;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.mgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.mcell{min-height:90px;padding:7px 5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.mcell:hover{background:var(--surface2)}
.mcell:nth-child(7n){border-right:none}
.mcell.mother{background:var(--bg)}
.mcell.mother .mday{color:var(--text3)}
.mcell.mtoday{background:var(--surface2)}
.mday{font-size:12px;color:var(--text2);font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:3px}
.mcell.mtoday .mday{background:var(--text);color:var(--bg);font-weight:600}
.mchip{display:block;border-radius:3px;padding:2px 5px;font-size:10px;font-weight:500;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .1s}
.mchip:hover{opacity:.82}
.mmore{font-size:10px;color:var(--text3);padding:1px 4px;font-weight:500}

/* NOTES */
.split-layout{display:flex;gap:16px;height:calc(100vh - 130px)}
.split-sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.split-sidebar h2{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:2px;padding-left:2px}
.note-item{padding:10px 12px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.note-item:hover{border-color:var(--border-med)}
.note-item.active{border-color:var(--text3);background:var(--surface2)}
.note-item-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-preview{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-date{font-size:10px;color:var(--text3);margin-top:3px}
.new-side-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:1px dashed var(--border-med);border-radius:var(--radius);padding:9px;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text3);transition:all .15s}
.new-side-btn:hover{border-color:var(--text3);color:var(--text2);background:var(--surface2)}
.split-main{flex:1;display:flex;flex-direction:column;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;min-width:0}
.split-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:8px;font-size:14px}
.note-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.note-title-inp{flex:1;background:none;border:none;outline:none;font-family:var(--font-display);font-size:21px;color:var(--text)}
.note-title-inp::placeholder{color:var(--text3)}
.note-del-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:5px 9px;border-radius:var(--radius);transition:all .15s}
.note-del-btn:hover{color:#C0392B;background:rgba(192,57,43,.08)}
.note-body-inp{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--text2);padding:16px;resize:none;line-height:1.75}
.note-body-inp::placeholder{color:var(--text3)}
.note-saved{font-size:10px;color:var(--text3);text-align:right;padding:0 14px 8px}

/* TO-DO */
.tlist-item{padding:8px 11px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
.tlist-item:hover{border-color:var(--border-med)}
.tlist-item.active{border-color:var(--text3);background:var(--surface2)}
.tlist-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tlist-name{font-size:13px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tlist-count{font-size:11px;color:var(--text3)}
.todo-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.todo-list-title{font-size:18px;font-weight:500;color:var(--text);font-family:var(--font-display)}
.todo-list-edit{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:4px 8px;border-radius:var(--radius);transition:all .15s}
.todo-list-edit:hover{color:var(--text);background:var(--surface2)}
.todo-items{flex:1;overflow-y:auto;padding:6px 0}
.todo-item{display:flex;align-items:flex-start;gap:11px;padding:9px 18px;transition:background .1s}
.todo-item:hover{background:var(--surface2)}
.todo-cb{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border-med);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.todo-cb.checked{background:var(--text);border-color:var(--text)}
.todo-cb.checked::after{content:'✓';font-size:10px;color:var(--bg)}
.todo-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.todo-text.done{text-decoration:line-through;color:var(--text3)}
.todo-del{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:2px 6px;border-radius:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.todo-item:hover .todo-del{opacity:1}
.todo-del:hover{color:#C0392B}
.todo-add-row{display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0}
.todo-add-inp{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:13px;color:var(--text)}
.todo-add-inp::placeholder{color:var(--text3)}
.todo-add-btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:6px 13px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;transition:opacity .15s}
.todo-add-btn:hover{opacity:.82}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fdin .15s ease}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border-med);padding:24px;width:440px;max-width:96vw;box-shadow:var(--shadow-lg);animation:scalein .15s ease;max-height:90vh;overflow-y:auto}
@keyframes scalein{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.frow input,.frow select,.frow textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.frow textarea{resize:vertical;min-height:80px;line-height:1.6}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--text3)}
.frow input.err{border-color:#E24B4A}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.mbtn{padding:8px 17px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;border:1px solid var(--border-med);background:none;color:var(--text2);transition:all .15s}
.mbtn:hover{background:var(--surface2);color:var(--text)}
.mbtn-primary{background:var(--text);color:var(--bg);border-color:transparent}
.mbtn-primary:hover{opacity:.83;background:var(--text)}
.mbtn-danger{color:#C0392B;border-color:rgba(192,57,43,.25)}
.mbtn-danger:hover{background:rgba(192,57,43,.08)}
.color-grid{display:flex;flex-wrap:wrap;gap:7px;padding-top:2px}
.cswatch{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;outline:2px solid transparent;outline-offset:2px}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{outline-color:var(--text)}
.tip{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}

/* EVENT DETAIL */
.ev-hdr{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px}
.ev-color-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ev-title{font-size:19px;font-weight:600;color:var(--text);line-height:1.2}
.ev-meta{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);margin-bottom:4px}
.ev-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;margin:6px 0 10px}
.ev-section{margin-top:14px}
.ev-section-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.ev-section-body{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.ev-section-body a{color:var(--text);text-underline-offset:2px}
.ev-info-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:13px}
.ev-info-key{color:var(--text3);white-space:nowrap;padding-top:1px}
.ev-info-val{color:var(--text2);word-break:break-all}
.ev-info-val a{color:var(--text)}
.ev-notes-ta{width:100%;font-size:13px;padding:9px 11px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--font);outline:none;resize:vertical;min-height:75px;line-height:1.6;transition:border-color .15s}
.ev-notes-ta:focus{border-color:var(--text3)}

@media(max-width:640px){
  .sidebar{display:none}
  .content{padding:14px}
  .topbar{padding:11px 14px}
  .today-big{font-size:30px}
  .split-layout{flex-direction:column;height:auto}
  .split-sidebar{width:100%;max-height:160px}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:10px}
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="logo">My Calendar<span>your day, all in one place</span></div>
  <div class="nav-section">
    <div class="nav-label">View</div>
    <button class="nav-btn" id="sideToday" onclick="setView(&#39;today&#39;)"><span class="nav-icon">☀</span>Today</button>
    <button class="nav-btn active" id="sideWeek" onclick="setView(&#39;week&#39;)"><span class="nav-icon">▤</span>Week</button>
    <button class="nav-btn" id="sideMonth" onclick="setView(&#39;month&#39;)"><span class="nav-icon">▦</span>Month</button>
    <button class="nav-btn" id="sideTodo" onclick="setView(&#39;todo&#39;)"><span class="nav-icon">✓</span>To-Do</button>
    <button class="nav-btn" id="sideNotes" onclick="setView(&#39;notes&#39;)"><span class="nav-icon">✎</span>Notes</button>
  </div>
  <div class="cals-section">
    <div class="nav-label">Calendars</div>
    <div id="sideCalsList"><div class="cal-item"><div class="cal-dot" style="background:#3B82F6"></div><div class="cal-name">Work</div><button class="cal-edit-btn" onclick="openEditCal(1,event)">✎</button></div><div class="cal-item"><div class="cal-dot" style="background:#8B5CF6"></div><div class="cal-name">Personal</div><button class="cal-edit-btn" onclick="openEditCal(2,event)">✎</button></div><div class="cal-item"><div class="cal-dot" style="background:#10B981"></div><div class="cal-name">Other</div><button class="cal-edit-btn" onclick="openEditCal(3,event)">✎</button></div></div>
    <button class="new-cal-btn" onclick="openNewCal()">+ New calendar</button>
  </div>
  <div class="sidebar-footer">
    <button class="footer-btn" onclick="openImportModal()">↓ Import .ics file</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="view-tabs">
        <button class="view-tab" id="tabToday" onclick="setView(&#39;today&#39;)">Today</button>
        <button class="view-tab active" id="tabWeek" onclick="setView(&#39;week&#39;)">Week</button>
        <button class="view-tab" id="tabMonth" onclick="setView(&#39;month&#39;)">Month</button>
        <button class="view-tab" id="tabTodo" onclick="setView(&#39;todo&#39;)">To-Do</button>
        <button class="view-tab" id="tabNotes" onclick="setView(&#39;notes&#39;)">Notes</button>
      </div>
      <div class="period-nav" id="periodNav" style="display: flex;">
        <button class="pnav-btn" onclick="shiftPeriod(-1)">‹</button>
        <div class="period-label" id="periodLabel">Mar 29 – Apr 4</div>
        <button class="pnav-btn" onclick="shiftPeriod(1)">›</button>
        <button class="mbtn" style="font-size:12px;padding:5px 11px" onclick="jumpToday()">Today</button>
      </div>
    </div>
    <button class="add-btn" id="topAddBtn" onclick="topAdd()">+ Add event</button>
  </div>
  <div class="content" id="mainContent"><div class="week-wrap"><div class="week-hdr"><div class="wdh"><div class="wdh-name">Su</div><div class="wdh-num">29</div></div><div class="wdh"><div class="wdh-name">Mo</div><div class="wdh-num">30</div></div><div class="wdh"><div class="wdh-name">Tu</div><div class="wdh-num">31</div></div><div class="wdh"><div class="wdh-name">We</div><div class="wdh-num">1</div></div><div class="wdh"><div class="wdh-name">Th</div><div class="wdh-num">2</div></div><div class="wdh"><div class="wdh-name">Fr</div><div class="wdh-num wtoday">3</div></div><div class="wdh"><div class="wdh-name">Sa</div><div class="wdh-num">4</div></div></div><div class="week-body" id="wbody"><div class="wcell"></div><div class="wcell"></div><div class="wcell"></div><div class="wcell"></div><div class="wcell"></div><div class="wcell wctoday"></div><div class="wcell"></div></div></div></div>
</div>
</div>

<input type="file" id="icsFile" accept=".ics" style="display:none">

<script>
const PALETTE=['#3B82F6','#8B5CF6','#10B981','#EF4444','#F59E0B','#06B6D4','#EC4899','#F97316','#64748B','#84CC16','#6366F1','#14B8A6','#E11D48','#D97706','#0EA5E9'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT=['Su','Mo','Tu','We','Th','Fr','Sa'];
const TODAY=new Date();

let S=loadState();
let view='today';
let navYear=TODAY.getFullYear(),navMonth=TODAY.getMonth();
let navWeekStart=weekStart(TODAY);
let activeNoteId=null,activeTodoListId=null;
let noteSaveTimer=null;

function defaultState(){
  return{
    calendars:[
      {id:1,name:'Work',color:'#3B82F6',visible:true},
      {id:2,name:'Personal',color:'#8B5CF6',visible:true},
      {id:3,name:'Other',color:'#10B981',visible:true}
    ],
    events:[],notes:[],
    todoLists:[{id:1,name:'Tasks',color:'#3B82F6'}],
    todos:[],
    nextCalId:4,nextEvId:1,nextNoteId:1,nextTodoListId:2,nextTodoId:1
  };
}
function loadState(){
  try{const s=localStorage.getItem('mycal_v4');return s?JSON.parse(s):defaultState();}
  catch{return defaultState();}
}
function persist(){localStorage.setItem('mycal_v4',JSON.stringify(S));}

// helpers
function fmtDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function todayStr(){return fmtDate(TODAY);}
function getCal(id){return S.calendars.find(c=>c.id===id);}
function fmt12(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${pad(m)} ${h>=12?'PM':'AM'}`;}
function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function visCals(){return new Set(S.calendars.filter(c=>c.visible).map(c=>c.id));}
function weekStart(d){const d2=new Date(d);d2.setHours(0,0,0,0);d2.setDate(d2.getDate()-d2.getDay());return d2;}
function addDays(d,n){const d2=new Date(d);d2.setDate(d2.getDate()+n);return d2;}
function fmtShort(d){return MONTHS[d.getMonth()].slice(0,3)+' '+d.getDate();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function linkify(text){return esc(text).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');}

// sidebar
function renderSidebar(){
  const el=document.getElementById('sideCalsList');
  el.innerHTML='';
  S.calendars.forEach(cal=>{
    const row=document.createElement('div');
    row.className='cal-item'+(cal.visible?'':' hidden');
    row.innerHTML=`<div class="cal-dot" style="background:${cal.color}"></div><div class="cal-name">${esc(cal.name)}</div><button class="cal-edit-btn" onclick="openEditCal(${cal.id},event)">✎</button>`;
    row.addEventListener('click',e=>{if(e.target.closest('.cal-edit-btn'))return;cal.visible=!cal.visible;persist();renderAll();});
    el.appendChild(row);
  });
  const ab=document.getElementById('topAddBtn');
  if(view==='notes')ab.textContent='+ New note';
  else if(view==='todo')ab.textContent='+ New list';
  else ab.textContent='+ Add event';
}

// TODAY
function renderToday(){
  const el=document.getElementById('mainContent');
  const ts=todayStr(),vis=visCals();
  const evs=S.events.filter(e=>e.date===ts&&vis.has(e.calId)).sort((a,b)=>a.time.localeCompare(b.time));
  el.innerHTML=`<div class="today-hdr"><div class="today-big">${MONTHS[TODAY.getMonth()]} ${TODAY.getDate()}</div><div class="today-sub">${DAYS[TODAY.getDay()]} · ${TODAY.getFullYear()}</div></div>`;
  if(!evs.length){el.innerHTML+=`<div class="no-events"><div style="font-size:32px">🗓</div><div>Nothing scheduled today</div><div style="font-size:12px">Click "+ Add event" to get started</div></div>`;return;}
  const tl=document.createElement('div');tl.className='timeline';
  evs.forEach(ev=>{
    const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
    const row=document.createElement('div');row.className='tl-ev';
    row.style.borderLeftColor=color;row.style.background=hex2rgba(color,.06);
    const preview=(ev.description||ev.notes||'').replace(/\\n/g,' ').replace(/\n/g,' ');
    const prevShort=preview.length>90?preview.substring(0,90)+'…':preview;
    row.innerHTML=`<div class="tl-time">${fmt12(ev.time)||'—'}</div><div class="tl-body"><div class="tl-title">${esc(ev.title)}</div><div class="tl-calname" style="color:${color}">${esc(cal?cal.name:'')}</div>${prevShort?`<div class="tl-desc">${esc(prevShort)}</div>`:''}</div>`;
    row.onclick=()=>openEventDetail(ev.id);
    tl.appendChild(row);
  });
  el.appendChild(tl);
}

// WEEK
function renderWeek(){
  const el=document.getElementById('mainContent');
  const vis=visCals(),ts=todayStr();
  const days=Array.from({length:7},(_,i)=>addDays(navWeekStart,i));
  const hdrHtml=days.map(d=>{const ds=fmtDate(d);const isT=ds===ts;return`<div class="wdh"><div class="wdh-name">${SHORT[d.getDay()]}</div><div class="wdh-num${isT?' wtoday':''}">${d.getDate()}</div></div>`;}).join('');
  el.innerHTML=`<div class="week-wrap"><div class="week-hdr">${hdrHtml}</div><div class="week-body" id="wbody"></div></div>`;
  const body=document.getElementById('wbody');
  days.forEach(d=>{
    const ds=fmtDate(d),isT=ds===ts;
    const dayEvs=S.events.filter(e=>e.date===ds&&vis.has(e.calId)).sort((a,b)=>a.time.localeCompare(b.time));
    const cell=document.createElement('div');cell.className='wcell'+(isT?' wctoday':'');
    dayEvs.slice(0,4).forEach(ev=>{
      const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
      const chip=document.createElement('div');chip.className='wchip';chip.style.background=color;
      chip.innerHTML=`${ev.time?`<span class="wchip-time">${fmt12(ev.time)}</span>`:''}${esc(ev.title)}`;
      chip.onclick=e=>{e.stopPropagation();openEventDetail(ev.id);};
      cell.appendChild(chip);
    });
    if(dayEvs.length>4){const m=document.createElement('div');m.className='wmore';m.textContent=`+${dayEvs.length-4} more`;cell.appendChild(m);}
    cell.addEventListener('click',()=>openAddEvent(ds));
    body.appendChild(cell);
  });
}

// MONTH
function renderMonth(){
  const el=document.getElementById('mainContent');
  const vis=visCals(),ts=todayStr();
  const first=new Date(navYear,navMonth,1).getDay();
  const dim=new Date(navYear,navMonth+1,0).getDate();
  const dimp=new Date(navYear,navMonth,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++){const mo=navMonth===0?11:navMonth-1;const yr=navMonth===0?navYear-1:navYear;cells.push({day:dimp-first+1+i,month:mo,year:yr,other:true});}
  for(let i=1;i<=dim;i++)cells.push({day:i,month:navMonth,year:navYear,other:false});
  while(cells.length<42){const d=cells.length-first-dim+1;const mo=navMonth===11?0:navMonth+1;const yr=navMonth===11?navYear+1:navYear;cells.push({day:d,month:mo,year:yr,other:true});}
  el.innerHTML=`<div class="month-wrap"><div class="mhdr">${SHORT.map(d=>`<div class="mhdr-cell">${d}</div>`).join('')}</div><div class="mgrid" id="mgrid"></div></div>`;
  const grid=document.getElementById('mgrid');
  cells.forEach(c=>{
    const ds=`${c.year}-${pad(c.month+1)}-${pad(c.day)}`;const isT=ds===ts;
    const dayEvs=S.events.filter(e=>e.date===ds&&vis.has(e.calId)).sort((a,b)=>a.time.localeCompare(b.time));
    const cell=document.createElement('div');cell.className='mcell'+(c.other?' mother':'')+(isT?' mtoday':'');
    cell.innerHTML=`<div class="mday">${c.day}</div>`;
    dayEvs.slice(0,3).forEach(ev=>{
      const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
      const chip=document.createElement('div');chip.className='mchip';chip.style.background=color;
      chip.textContent=(ev.time?fmt12(ev.time)+' ':'')+ev.title;
      chip.onclick=e=>{e.stopPropagation();openEventDetail(ev.id);};
      cell.appendChild(chip);
    });
    if(dayEvs.length>3){const m=document.createElement('div');m.className='mmore';m.textContent=`+${dayEvs.length-3} more`;cell.appendChild(m);}
    cell.addEventListener('click',()=>openAddEvent(ds));
    grid.appendChild(cell);
  });
}

// NOTES
function renderNotes(){
  const el=document.getElementById('mainContent');el.innerHTML='';
  const layout=document.createElement('div');layout.className='split-layout';
  const sb=document.createElement('div');sb.className='split-sidebar';
  sb.innerHTML='<h2>Notes</h2>';
  if(!S.notes.length)sb.innerHTML+='<div style="font-size:12px;color:var(--text3);padding:6px 2px">No notes yet</div>';
  S.notes.slice().reverse().forEach(note=>{
    const item=document.createElement('div');item.className='note-item'+(activeNoteId===note.id?' active':'');
    const preview=(note.body||'').replace(/\n/g,' ').substring(0,50);
    item.innerHTML=`<div class="note-item-title">${esc(note.title||'Untitled')}</div><div class="note-item-preview">${esc(preview)||'No content'}</div><div class="note-item-date">${note.updated||''}</div>`;
    item.onclick=()=>{activeNoteId=note.id;renderNotes();};
    sb.appendChild(item);
  });
  const nb=document.createElement('button');nb.className='new-side-btn';nb.textContent='+ New note';nb.onclick=createNote;
  sb.appendChild(nb);
  const editor=document.createElement('div');editor.className='split-main';
  const note=S.notes.find(n=>n.id===activeNoteId);
  if(!note){
    editor.innerHTML='<div class="split-placeholder"><div style="font-size:28px">✎</div><div>Select a note or create one</div></div>';
  } else {
    editor.innerHTML=`<div class="note-topbar"><input class="note-title-inp" id="noteTitleInp" placeholder="Title" value="${esc(note.title||'')}"><button class="note-del-btn" onclick="deleteNote(${note.id})">Delete</button></div><textarea class="note-body-inp" id="noteBodyInp" placeholder="Start writing…">${esc(note.body||'')}</textarea><div class="note-saved" id="noteSavedLbl">Saved</div>`;
    setTimeout(()=>{
      const ti=document.getElementById('noteTitleInp');
      const bi=document.getElementById('noteBodyInp');
      if(ti)ti.addEventListener('input',scheduleNoteSave);
      if(bi)bi.addEventListener('input',scheduleNoteSave);
    },0);
  }
  layout.appendChild(sb);layout.appendChild(editor);el.appendChild(layout);
}
function scheduleNoteSave(){
  const lbl=document.getElementById('noteSavedLbl');if(lbl)lbl.textContent='Saving…';
  clearTimeout(noteSaveTimer);
  noteSaveTimer=setTimeout(()=>{
    const note=S.notes.find(n=>n.id===activeNoteId);if(!note)return;
    const ti=document.getElementById('noteTitleInp');const bi=document.getElementById('noteBodyInp');
    if(ti)note.title=ti.value;if(bi)note.body=bi.value;
    note.updated=new Date().toLocaleDateString();
    persist();if(lbl)lbl.textContent='Saved';
  },600);
}
function createNote(){
  const note={id:S.nextNoteId++,title:'',body:'',updated:new Date().toLocaleDateString()};
  S.notes.push(note);activeNoteId=note.id;persist();renderNotes();
  setTimeout(()=>{const ti=document.getElementById('noteTitleInp');if(ti)ti.focus();},50);
}
function deleteNote(id){
  S.notes=S.notes.filter(n=>n.id!==id);
  if(activeNoteId===id)activeNoteId=S.notes.length?S.notes[S.notes.length-1].id:null;
  persist();renderNotes();
}

// TO-DO
function renderTodo(){
  const el=document.getElementById('mainContent');el.innerHTML='';
  const layout=document.createElement('div');layout.className='split-layout';
  const sb=document.createElement('div');sb.className='split-sidebar';
  sb.innerHTML='<h2>Lists</h2>';
  S.todoLists.forEach(list=>{
    const count=S.todos.filter(t=>t.listId===list.id&&!t.done).length;
    const item=document.createElement('div');item.className='tlist-item'+(activeTodoListId===list.id?' active':'');
    item.innerHTML=`<div class="tlist-dot" style="background:${list.color}"></div><div class="tlist-name">${esc(list.name)}</div><div class="tlist-count">${count||''}</div>`;
    item.onclick=()=>{activeTodoListId=list.id;renderTodo();};
    sb.appendChild(item);
  });
  const nb=document.createElement('button');nb.className='new-side-btn';nb.textContent='+ New list';nb.onclick=openNewTodoList;
  sb.appendChild(nb);
  const main=document.createElement('div');main.className='split-main';
  const list=S.todoLists.find(l=>l.id===activeTodoListId);
  if(!list){
    main.innerHTML='<div class="split-placeholder"><div style="font-size:28px">✓</div><div>Select or create a list</div></div>';
  } else {
    const todos=S.todos.filter(t=>t.listId===list.id);
    const open=todos.filter(t=>!t.done);const done=todos.filter(t=>t.done);
    main.innerHTML=`<div class="todo-topbar"><div class="todo-list-title" style="color:${list.color}">${esc(list.name)}</div><button class="todo-list-edit" onclick="openEditTodoList(${list.id})">Edit list</button></div><div class="todo-items" id="todoItems"></div><div class="todo-add-row"><input class="todo-add-inp" id="todoAddInp" placeholder="Add a task… (press Enter)" onkeydown="if(event.key==='Enter')addTodoItem()"><button class="todo-add-btn" onclick="addTodoItem()">Add</button></div>`;
    setTimeout(()=>{
      const container=document.getElementById('todoItems');if(!container)return;
      const allTodos=[...open,...done];
      if(!allTodos.length){container.innerHTML='<div style="text-align:center;color:var(--text3);padding:30px;font-size:13px">No tasks yet — add one below</div>';return;}
      allTodos.forEach(todo=>{
        const row=document.createElement('div');row.className='todo-item';
        row.innerHTML=`<div class="todo-cb${todo.done?' checked':''}" onclick="toggleTodo(${todo.id})"></div><div class="todo-text${todo.done?' done':''}">${esc(todo.text)}</div><button class="todo-del" onclick="deleteTodo(${todo.id})">✕</button>`;
        container.appendChild(row);
      });
    },0);
  }
  layout.appendChild(sb);layout.appendChild(main);el.appendChild(layout);
}
function addTodoItem(){
  const inp=document.getElementById('todoAddInp');if(!inp)return;
  const text=inp.value.trim();if(!text||!activeTodoListId)return;
  S.todos.push({id:S.nextTodoId++,listId:activeTodoListId,text,done:false});
  inp.value='';persist();renderTodo();
  setTimeout(()=>{const i=document.getElementById('todoAddInp');if(i)i.focus();},30);
}
function toggleTodo(id){const t=S.todos.find(t=>t.id===id);if(t){t.done=!t.done;persist();renderTodo();}}
function deleteTodo(id){S.todos=S.todos.filter(t=>t.id!==id);persist();renderTodo();}
function openNewTodoList(){
  const def=PALETTE[S.todoLists.length%PALETTE.length];
  modal(`<h3>New list</h3><div class="frow"><label>Name</label><input id="tlName" type="text" placeholder="e.g. Shopping, Work Tasks…"/></div><div class="frow"><label>Color</label>${colorGrid(def)}</div><div class="modal-actions"><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="createTodoList()">Create</button></div>`);
  setTimeout(()=>document.getElementById('tlName').focus(),50);
}
function createTodoList(){
  const name=document.getElementById('tlName').value.trim();
  if(!name){document.getElementById('tlName').classList.add('err');return;}
  const list={id:S.nextTodoListId++,name,color:document.getElementById('pickedColor').value};
  S.todoLists.push(list);activeTodoListId=list.id;persist();closeModal();renderTodo();
}
function openEditTodoList(id){
  const list=S.todoLists.find(l=>l.id===id);if(!list)return;
  modal(`<h3>Edit list</h3><div class="frow"><label>Name</label><input id="tlName" type="text" value="${esc(list.name)}"/></div><div class="frow"><label>Color</label>${colorGrid(list.color)}</div><div class="modal-actions"><button class="mbtn mbtn-danger" onclick="deleteTodoList(${id})">Delete list</button><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="saveTodoList(${id})">Save</button></div>`);
  setTimeout(()=>document.getElementById('tlName').focus(),50);
}
function saveTodoList(id){
  const list=S.todoLists.find(l=>l.id===id);
  const name=document.getElementById('tlName').value.trim();
  if(!name){document.getElementById('tlName').classList.add('err');return;}
  list.name=name;list.color=document.getElementById('pickedColor').value;
  persist();closeModal();renderTodo();
}
function deleteTodoList(id){
  if(!confirm('Delete this list and all its tasks?'))return;
  S.todoLists=S.todoLists.filter(l=>l.id!==id);
  S.todos=S.todos.filter(t=>t.listId!==id);
  if(activeTodoListId===id)activeTodoListId=S.todoLists[0]?.id||null;
  persist();closeModal();renderTodo();
}

// VIEW CONTROL
function setView(v){
  view=v;
  ['today','week','month','todo','notes'].forEach(n=>{
    const cap=n.charAt(0).toUpperCase()+n.slice(1);
    document.getElementById('tab'+cap).classList.toggle('active',v===n);
    document.getElementById('side'+cap).classList.toggle('active',v===n);
  });
  document.getElementById('periodNav').style.display=(v==='week'||v==='month')?'flex':'none';
  updatePeriodLabel();
  const ab=document.getElementById('topAddBtn');
  if(v==='notes')ab.textContent='+ New note';
  else if(v==='todo')ab.textContent='+ New list';
  else ab.textContent='+ Add event';
  renderMain();
}
function topAdd(){
  if(view==='notes')createNote();
  else if(view==='todo')openNewTodoList();
  else openAddEvent();
}
function renderMain(){
  if(view==='today')renderToday();
  else if(view==='week')renderWeek();
  else if(view==='month')renderMonth();
  else if(view==='notes')renderNotes();
  else if(view==='todo')renderTodo();
}
function renderAll(){renderSidebar();renderMain();}
function updatePeriodLabel(){
  const el=document.getElementById('periodLabel');
  if(view==='month')el.textContent=MONTHS[navMonth]+' '+navYear;
  else if(view==='week'){const end=addDays(navWeekStart,6);el.textContent=fmtShort(navWeekStart)+' – '+fmtShort(end);}
}
function shiftPeriod(d){
  if(view==='month'){navMonth+=d;if(navMonth<0){navMonth=11;navYear--;}if(navMonth>11){navMonth=0;navYear++;}}
  else if(view==='week'){navWeekStart=addDays(navWeekStart,d*7);}
  updatePeriodLabel();renderMain();
}
function jumpToday(){navYear=TODAY.getFullYear();navMonth=TODAY.getMonth();navWeekStart=weekStart(TODAY);updatePeriodLabel();renderMain();}

// ADD EVENT
function openAddEvent(prefill){
  const date=prefill||todayStr();
  const opts=S.calendars.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  modal(`<h3>Add event</h3>
    <div class="frow"><label>Title</label><input id="evTitle" type="text" placeholder="Event name"/></div>
    <div class="frow"><label>Calendar</label><select id="evCal">${opts}</select></div>
    <div class="frow"><label>Date</label><input id="evDate" type="date" value="${date}"/></div>
    <div class="frow"><label>Time</label><input id="evTime" type="time" value="09:00"/></div>
    <div class="frow"><label>Location</label><input id="evLoc" type="text" placeholder="Optional"/></div>
    <div class="frow"><label>Description</label><textarea id="evDesc" placeholder="Details, links, notes…"></textarea></div>
    <div class="modal-actions"><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="saveEvent()">Save event</button></div>`);
  setTimeout(()=>document.getElementById('evTitle').focus(),50);
}
function saveEvent(){
  const t=document.getElementById('evTitle').value.trim();
  if(!t){document.getElementById('evTitle').classList.add('err');return;}
  S.events.push({id:S.nextEvId++,title:t,date:document.getElementById('evDate').value,time:document.getElementById('evTime').value,calId:parseInt(document.getElementById('evCal').value),location:document.getElementById('evLoc').value.trim(),description:document.getElementById('evDesc').value.trim(),notes:'',organizer:'',attendees:[],url:'',status:''});
  persist();closeModal();renderAll();
}

// EVENT DETAIL
function openEventDetail(evId){
  const ev=S.events.find(e=>e.id===evId);if(!ev)return;
  const cal=getCal(ev.calId);const color=cal?cal.color:'#888';
  let infoRows='';
  if(ev.location)infoRows+=`<div class="ev-info-key">📍 Location</div><div class="ev-info-val">${linkify(ev.location)}</div>`;
  if(ev.organizer)infoRows+=`<div class="ev-info-key">👤 Organizer</div><div class="ev-info-val">${esc(ev.organizer)}</div>`;
  if(ev.attendees&&ev.attendees.length)infoRows+=`<div class="ev-info-key">👥 Attendees</div><div class="ev-info-val">${ev.attendees.map(a=>esc(a)).join(', ')}</div>`;
  if(ev.url)infoRows+=`<div class="ev-info-key">🔗 Link</div><div class="ev-info-val"><a href="${esc(ev.url)}" target="_blank" rel="noopener">${esc(ev.url)}</a></div>`;
  if(ev.status&&ev.status!=='CONFIRMED')infoRows+=`<div class="ev-info-key">Status</div><div class="ev-info-val">${esc(ev.status)}</div>`;
  const descText=(ev.description||'').replace(/\\n/g,'\n');
  modal(`
    <div class="ev-hdr"><div class="ev-color-dot" style="background:${color}"></div><div class="ev-title">${esc(ev.title)}</div></div>
    <div class="ev-meta">📅 ${ev.date}${ev.time?' · '+fmt12(ev.time):''}</div>
    <div class="ev-badge" style="background:${hex2rgba(color,.12)};color:${color}"><span style="width:6px;height:6px;border-radius:50%;background:${color};display:inline-block"></span>${esc(cal?cal.name:'')}</div>
    ${infoRows?`<div class="ev-section"><div class="ev-section-label">Event Details</div><div class="ev-info-grid">${infoRows}</div></div>`:''}
    ${descText?`<div class="ev-section"><div class="ev-section-label">Description</div><div class="ev-section-body">${linkify(descText)}</div></div>`:''}
    <div class="ev-section">
      <div class="ev-section-label">My Notes</div>
      <textarea class="ev-notes-ta" id="evNotesTa" placeholder="Add your own notes about this event…">${esc(ev.notes||'')}</textarea>
    </div>
    <div class="modal-actions">
      <button class="mbtn mbtn-danger" onclick="deleteEvent(${ev.id})">Delete</button>
      <button class="mbtn" onclick="closeModal()">Close</button>
      <button class="mbtn mbtn-primary" onclick="saveEvNotes(${ev.id})">Save notes</button>
    </div>`);
}
function saveEvNotes(id){const ev=S.events.find(e=>e.id===id);if(!ev)return;const ta=document.getElementById('evNotesTa');if(ta)ev.notes=ta.value;persist();closeModal();renderAll();}
function deleteEvent(id){S.events=S.events.filter(e=>e.id!==id);persist();closeModal();renderAll();}

// CALENDAR MODALS
function colorGrid(sel){return`<div class="color-grid">${PALETTE.map(c=>`<div class="cswatch${c===sel?' sel':''}" style="background:${c}" data-color="${c}" onclick="pickSwatch(this)"></div>`).join('')}</div><input type="hidden" id="pickedColor" value="${sel}">`;}
function pickSwatch(el){document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');document.getElementById('pickedColor').value=el.dataset.color;}
function openNewCal(){
  const def=PALETTE[S.calendars.length%PALETTE.length];
  modal(`<h3>New calendar</h3><div class="frow"><label>Name</label><input id="calName" type="text" placeholder="e.g. Family, Classes…"/></div><div class="frow"><label>Color</label>${colorGrid(def)}</div><div class="modal-actions"><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="createCal()">Create</button></div>`);
  setTimeout(()=>document.getElementById('calName').focus(),50);
}
function createCal(){
  const name=document.getElementById('calName').value.trim();
  if(!name){document.getElementById('calName').classList.add('err');return;}
  S.calendars.push({id:S.nextCalId++,name,color:document.getElementById('pickedColor').value,visible:true});
  persist();closeModal();renderAll();
}
function openEditCal(id,e){
  e&&e.stopPropagation();
  const cal=getCal(id);if(!cal)return;
  modal(`<h3>Edit calendar</h3><div class="frow"><label>Name</label><input id="calName" type="text" value="${esc(cal.name)}"/></div><div class="frow"><label>Color</label>${colorGrid(cal.color)}</div><div class="modal-actions"><button class="mbtn mbtn-danger" onclick="deleteCal(${id})">Delete</button><button class="mbtn" onclick="closeModal()">Cancel</button><button class="mbtn mbtn-primary" onclick="updateCal(${id})">Save</button></div>`);
  setTimeout(()=>document.getElementById('calName').focus(),50);
}
function updateCal(id){
  const cal=getCal(id);const name=document.getElementById('calName').value.trim();
  if(!name){document.getElementById('calName').classList.add('err');return;}
  cal.name=name;cal.color=document.getElementById('pickedColor').value;
  persist();closeModal();renderAll();
}
function deleteCal(id){
  if(!confirm('Delete this calendar? All its events will be removed.'))return;
  S.calendars=S.calendars.filter(c=>c.id!==id);S.events=S.events.filter(e=>e.calId!==id);
  persist();closeModal();renderAll();
}

// IMPORT
function openImportModal(){
  const opts=S.calendars.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  modal(`<h3>Import calendar (.ics)</h3>
    <div class="frow"><label>Add events to</label><select id="importCal">${opts}</select></div>
    <div class="frow"><label>File</label><button class="mbtn" style="width:100%" onclick="document.getElementById('icsFile').click()">Choose .ics file…</button><div class="tip">Google Calendar: Settings → your calendar → Export<br>Outlook: File → Open & Export → Export to file → ICS</div></div>
    <div id="importResult" style="font-size:13px;color:var(--text2);margin-top:8px;display:none"></div>
    <div class="modal-actions"><button class="mbtn mbtn-primary" onclick="closeModal()">Done</button></div>`);
}

document.getElementById('icsFile').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const calId=parseInt(document.getElementById('importCal')?.value||S.calendars[0]?.id);
  const reader=new FileReader();
  reader.onload=e=>{
    const parsed=parseICS(e.target.result,calId);
    S.events=S.events.concat(parsed);S.nextEvId+=parsed.length;
    persist();renderAll();
    const res=document.getElementById('importResult');
    if(res){res.style.display='block';res.textContent=`✓ Imported ${parsed.length} event${parsed.length!==1?'s':''}`;}
  };
  reader.readAsText(file);this.value='';
});

function parseICS(raw,calId){
  // unfold RFC 5545 folded lines
  const text=raw.replace(/\r\n[ \t]/g,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const result=[];let id=S.nextEvId;
  text.split('BEGIN:VEVENT').slice(1).forEach(block=>{
    const end=block.indexOf('END:VEVENT');
    if(end>-1)block=block.substring(0,end);
    const lines=block.split('\n');
    // get first matching property (handles param like DTSTART;TZID=...)
    const get=key=>{
      for(const line of lines){
        const ci=line.indexOf(':');if(ci<0)continue;
        const k=line.substring(0,ci).split(';')[0].toUpperCase();
        if(k===key.toUpperCase())return line.substring(ci+1).trim();
      }
      return'';
    };
    // get all matching (for ATTENDEE)
    const getAll=key=>lines.filter(l=>{const ci=l.indexOf(':');return ci>0&&l.substring(0,ci).split(';')[0].toUpperCase()===key.toUpperCase();}).map(l=>l.substring(l.indexOf(':')+1).trim());
    const dec=s=>s.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\');

    const summary=dec(get('SUMMARY'));
    const dtstart=get('DTSTART');
    if(!summary||!dtstart)return;

    const digits=dtstart.replace(/[^0-9]/g,'');
    const ds=`${digits.substring(0,4)}-${digits.substring(4,6)}-${digits.substring(6,8)}`;
    let time='';
    if(digits.length>=13){const h=parseInt(digits.substring(9,11)),mn=digits.substring(11,13);time=`${pad(h)}:${mn}`;}

    // rich fields from Google Calendar
    const description=dec(get('DESCRIPTION'));
    const location=dec(get('LOCATION'));
    const url=get('URL');
    const status=get('STATUS');

    // organizer: prefer CN= param, fall back to email
    const orgLine=lines.find(l=>l.substring(0,l.indexOf(':')).split(';')[0].toUpperCase()==='ORGANIZER')||'';
    const orgCN=(orgLine.match(/CN=([^;:]+)/i)||[])[1]||'';
    const orgEmail=(orgLine.match(/mailto:(.+)$/i)||[])[1]||'';
    const organizer=dec(orgCN||orgEmail);

    // attendees
    const attendees=getAll('ATTENDEE').map(a=>{
      const cn=(a.match(/(?:^|;)CN=([^;:]+)/i)||[])[1];
      const email=(a.match(/mailto:(.+)$/i)||[])[1];
      return dec(cn||email||'');
    }).filter(Boolean).slice(0,12);

    result.push({id:id++,title:summary,date:ds,time,calId,description,location,url,status,organizer,attendees,notes:''});
  });
  return result;
}

// MODAL
let curModal=null;
function modal(html){
  closeModal();
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});
  document.body.appendChild(bg);curModal=bg;return bg;
}
function closeModal(){if(curModal){curModal.remove();curModal=null;}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// BOOT — migrate old data if needed
if(!S.todoLists){S.todoLists=defaultState().todoLists;S.nextTodoListId=2;}
if(!S.todos)S.todos=[];
if(!S.notes)S.notes=[];
if(!S.nextTodoListId)S.nextTodoListId=2;
if(!S.nextTodoId)S.nextTodoId=1;
if(!S.nextNoteId)S.nextNoteId=1;
if(S.todoLists.length)activeTodoListId=S.todoLists[0].id;
// ensure all events have new fields
S.events.forEach(ev=>{
  if(!ev.location)ev.location='';
  if(!ev.description)ev.description='';
  if(!ev.attendees)ev.attendees=[];
  if(!ev.organizer)ev.organizer='';
  if(!ev.url)ev.url='';
  if(!ev.status)ev.status='';
});

updatePeriodLabel();
renderAll();
</script>
